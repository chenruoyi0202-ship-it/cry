<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>偏头痛记录</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #12131a;
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Microsoft YaHei", sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 32px 8px 48px;
        }
        .card {
            width: 100%;
            max-width: 460px;
            background: linear-gradient(180deg, #1e2230 0%, #181c28 100%);
            border-radius: 20px;
            padding: 28px 22px 24px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.5);
            align-self: flex-start;
        }
        .header { text-align: center; margin-bottom: 18px; }
        .badge {
            display: inline-block;
            background: rgba(123,97,255,0.15);
            color: #7b61ff;
            font-size: 12px;
            font-weight: 600;
            border-radius: 8px;
            padding: 3px 12px;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }
        .header h1 {
            font-size: 22px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 4px;
        }
        .header .sub {
            font-size: 13px;
            color: #6b7394;
        }

        /* Tabs */
        .tab-bar {
            display: flex;
            gap: 4px;
            background: rgba(255,255,255,0.04);
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 20px;
        }
        .tab {
            flex: 1;
            background: none;
            border: none;
            color: #6b7394;
            font-size: 14px;
            font-weight: 500;
            padding: 8px 0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .tab.active {
            background: rgba(123,97,255,0.15);
            color: #7b61ff;
        }

        /* Form */
        .section-title {
            font-size: 13px;
            color: #8892b0;
            font-weight: 600;
            margin-bottom: 12px;
            letter-spacing: 1px;
        }
        .field { margin-bottom: 16px; }
        .field label {
            display: block;
            font-size: 12px;
            color: #6b7394;
            margin-bottom: 6px;
            font-weight: 500;
        }
        .field input, .field textarea {
            width: 100%;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px;
            padding: 10px 14px;
            color: #fff;
            font-size: 15px;
            outline: none;
            font-family: inherit;
            transition: border-color 0.2s;
        }
        .field input:focus, .field textarea:focus {
            border-color: rgba(123,97,255,0.4);
        }
        .field textarea {
            min-height: 60px;
            resize: vertical;
        }

        /* Intensity slider */
        .intensity-row {
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .intensity-row input[type="range"] {
            flex: 1;
            -webkit-appearance: none;
            appearance: none;
            height: 6px;
            border-radius: 3px;
            background: linear-gradient(90deg, #4caf50, #ffb74d, #f44336);
            outline: none;
            border: none;
            padding: 0;
        }
        .intensity-row input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: #fff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            cursor: pointer;
        }
        .intensity-row input[type="range"]::-moz-range-thumb {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: #fff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            cursor: pointer;
            border: none;
        }
        .intensity-val {
            min-width: 44px;
            text-align: center;
            font-size: 22px;
            font-weight: 700;
        }

        /* Tag toggles */
        .tag-group {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .tag-toggle {
            display: inline-flex;
            align-items: center;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 6px 14px;
            font-size: 13px;
            color: #8892b0;
            cursor: pointer;
            transition: all 0.2s;
            user-select: none;
        }
        .tag-toggle.active {
            background: rgba(123,97,255,0.15);
            border-color: rgba(123,97,255,0.4);
            color: #7b61ff;
        }

        /* Buttons */
        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #7b61ff 0%, #6c4fff 100%);
            color: #fff;
            box-shadow: 0 4px 16px rgba(123,97,255,0.3);
        }
        .btn-primary:active {
            transform: scale(0.98);
        }

        /* History */
        .history-item {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 14px;
            padding: 14px 16px;
            margin-bottom: 10px;
            position: relative;
        }
        .hi-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .hi-date {
            font-size: 14px;
            color: #fff;
            font-weight: 500;
        }
        .hi-intensity {
            font-size: 12px;
            font-weight: 700;
            padding: 3px 10px;
            border-radius: 8px;
        }
        .hi-details {
            font-size: 12px;
            color: #6b7394;
            line-height: 1.8;
        }
        .hi-details span {
            color: #8892b0;
        }
        .hi-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin-top: 6px;
        }
        .hi-tag {
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 10px;
            background: rgba(255,255,255,0.06);
            color: #8892b0;
        }
        .hi-del {
            position: absolute;
            top: 12px;
            right: 14px;
            background: none;
            border: none;
            color: #f44336;
            font-size: 18px;
            cursor: pointer;
            opacity: 0.5;
            transition: opacity 0.2s;
            line-height: 1;
        }
        .hi-del:hover { opacity: 1; }

        /* Stats */
        .stat-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 14px;
            padding: 14px;
            text-align: center;
        }
        .stat-card .sc-val {
            font-size: 24px;
            font-weight: 700;
            color: #fff;
        }
        .stat-card .sc-label {
            font-size: 12px;
            color: #6b7394;
            margin-top: 4px;
        }
        .stat-section {
            margin-bottom: 18px;
        }
        .stat-section h3 {
            font-size: 13px;
            color: #8892b0;
            font-weight: 600;
            margin-bottom: 10px;
        }
        .stat-bar-row {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
            font-size: 13px;
        }
        .stat-bar-label {
            width: 70px;
            color: #8892b0;
            flex-shrink: 0;
        }
        .stat-bar-track {
            flex: 1;
            height: 8px;
            background: rgba(255,255,255,0.06);
            border-radius: 4px;
            overflow: hidden;
            margin: 0 10px;
        }
        .stat-bar-fill {
            height: 100%;
            border-radius: 4px;
            background: linear-gradient(90deg, #7b61ff, #6c4fff);
            transition: width 0.3s;
        }
        .stat-bar-count {
            width: 28px;
            text-align: right;
            color: #6b7394;
            font-size: 12px;
        }

        /* Empty */
        .empty-state {
            text-align: center;
            color: #4a5070;
            font-size: 14px;
            padding: 32px 0;
        }

        /* Footer */
        .disclaimer {
            text-align: center;
            color: #4a5070;
            font-size: 11px;
            margin-top: 18px;
            line-height: 1.8;
        }
        .disclaimer a {
            color: #7b61ff;
            text-decoration: none;
        }

        /* Success toast */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-60px);
            background: #4caf50;
            color: #fff;
            padding: 10px 24px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            opacity: 0;
            transition: all 0.3s;
            z-index: 100;
            pointer-events: none;
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="toast" id="toast">记录已保存</div>
    <div class="card">
        <div class="header">
            <div class="badge">MIGRAINE TRACKER</div>
            <h1>偏头痛记录</h1>
            <p class="sub">记录、追踪、分析你的偏头痛</p>
        </div>

        <div class="tab-bar">
            <button class="tab active" onclick="switchTab('record')">记录</button>
            <button class="tab" onclick="switchTab('history')">历史</button>
            <button class="tab" onclick="switchTab('stats')">统计</button>
        </div>

        <!-- Tab: Record -->
        <div class="tab-content" id="tabRecord">
            <div class="section-title">新建记录</div>

            <div class="field">
                <label>发作时间</label>
                <input type="datetime-local" id="inputDatetime">
            </div>

            <div class="field">
                <label>疼痛强度</label>
                <div class="intensity-row">
                    <input type="range" id="inputIntensity" min="1" max="10" value="5" oninput="updateIntensity()">
                    <div class="intensity-val" id="intensityVal">5</div>
                </div>
            </div>

            <div class="field">
                <label>持续时长（小时）</label>
                <input type="number" id="inputDuration" min="0" step="0.5" placeholder="例如 2.5">
            </div>

            <div class="field">
                <label>头痛位置</label>
                <div class="tag-group" id="groupLocation">
                    <span class="tag-toggle" data-value="左侧" onclick="toggleTag(this)">左侧</span>
                    <span class="tag-toggle" data-value="右侧" onclick="toggleTag(this)">右侧</span>
                    <span class="tag-toggle" data-value="前额" onclick="toggleTag(this)">前额</span>
                    <span class="tag-toggle" data-value="后脑" onclick="toggleTag(this)">后脑</span>
                    <span class="tag-toggle" data-value="全头" onclick="toggleTag(this)">全头</span>
                </div>
            </div>

            <div class="field">
                <label>伴随症状</label>
                <div class="tag-group" id="groupSymptoms">
                    <span class="tag-toggle" data-value="恶心" onclick="toggleTag(this)">恶心</span>
                    <span class="tag-toggle" data-value="呕吐" onclick="toggleTag(this)">呕吐</span>
                    <span class="tag-toggle" data-value="畏光" onclick="toggleTag(this)">畏光</span>
                    <span class="tag-toggle" data-value="畏声" onclick="toggleTag(this)">畏声</span>
                    <span class="tag-toggle" data-value="视觉障碍" onclick="toggleTag(this)">视觉障碍</span>
                </div>
            </div>

            <div class="field">
                <label>可能诱因</label>
                <div class="tag-group" id="groupTriggers">
                    <span class="tag-toggle" data-value="压力" onclick="toggleTag(this)">压力</span>
                    <span class="tag-toggle" data-value="睡眠不足" onclick="toggleTag(this)">睡眠不足</span>
                    <span class="tag-toggle" data-value="饮食" onclick="toggleTag(this)">饮食</span>
                    <span class="tag-toggle" data-value="天气" onclick="toggleTag(this)">天气</span>
                    <span class="tag-toggle" data-value="月经" onclick="toggleTag(this)">月经</span>
                    <span class="tag-toggle" data-value="运动" onclick="toggleTag(this)">运动</span>
                    <span class="tag-toggle" data-value="酒精" onclick="toggleTag(this)">酒精</span>
                    <span class="tag-toggle" data-value="其他" onclick="toggleTag(this)">其他</span>
                </div>
            </div>

            <div class="field">
                <label>用药</label>
                <input type="text" id="inputMedication" placeholder="例如 布洛芬 400mg">
            </div>

            <div class="field">
                <label>备注</label>
                <textarea id="inputNotes" placeholder="其他信息..."></textarea>
            </div>

            <button class="btn btn-primary" onclick="addEpisode()">保存记录</button>
        </div>

        <!-- Tab: History -->
        <div class="tab-content" id="tabHistory" style="display:none">
            <div class="section-title">历史记录</div>
            <div id="historyList">
                <div class="empty-state">暂无记录</div>
            </div>
        </div>

        <!-- Tab: Stats -->
        <div class="tab-content" id="tabStats" style="display:none">
            <div class="section-title">统计分析</div>
            <div id="statsArea">
                <div class="empty-state">暂无数据</div>
            </div>
        </div>

        <div class="disclaimer">
            <a href="index.html">止盈计算推演 →</a>
        </div>
    </div>

    <script>
        let records = [];

        function loadRecords() {
            try {
                records = JSON.parse(localStorage.getItem('migraine_records')) || [];
            } catch (e) {
                records = [];
            }
        }

        function saveRecords() {
            localStorage.setItem('migraine_records', JSON.stringify(records));
        }

        // --- Tabs ---
        function switchTab(name) {
            document.querySelectorAll('.tab-content').forEach(el => el.style.display = 'none');
            document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
            document.getElementById('tab' + name.charAt(0).toUpperCase() + name.slice(1)).style.display = '';
            event.target.classList.add('active');
            if (name === 'history') renderHistory();
            if (name === 'stats') renderStats();
        }

        // --- Intensity ---
        function updateIntensity() {
            const v = document.getElementById('inputIntensity').value;
            const el = document.getElementById('intensityVal');
            el.textContent = v;
            el.style.color = getIntensityColor(v);
        }

        function getIntensityColor(v) {
            if (v <= 3) return '#4caf50';
            if (v <= 6) return '#ffb74d';
            return '#f44336';
        }

        function getIntensityLabel(v) {
            if (v <= 3) return '轻度';
            if (v <= 6) return '中度';
            return '重度';
        }

        // --- Tags ---
        function toggleTag(el) {
            el.classList.toggle('active');
        }

        function getTagValues(groupId) {
            return Array.from(document.querySelectorAll('#' + groupId + ' .tag-toggle.active'))
                .map(el => el.dataset.value);
        }

        // --- Form ---
        function initForm() {
            const now = new Date();
            now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
            document.getElementById('inputDatetime').value = now.toISOString().slice(0, 16);
            document.getElementById('inputIntensity').value = 5;
            document.getElementById('inputDuration').value = '';
            document.getElementById('inputMedication').value = '';
            document.getElementById('inputNotes').value = '';
            document.querySelectorAll('.tag-toggle').forEach(el => el.classList.remove('active'));
            updateIntensity();
        }

        function addEpisode() {
            const datetime = document.getElementById('inputDatetime').value;
            const intensity = parseInt(document.getElementById('inputIntensity').value);
            const duration = parseFloat(document.getElementById('inputDuration').value) || 0;
            const location = getTagValues('groupLocation');
            const symptoms = getTagValues('groupSymptoms');
            const triggers = getTagValues('groupTriggers');
            const medication = document.getElementById('inputMedication').value.trim();
            const notes = document.getElementById('inputNotes').value.trim();

            if (!datetime) return;

            records.push({
                id: Date.now(),
                datetime, intensity, duration,
                location, symptoms, triggers,
                medication, notes
            });
            saveRecords();
            showToast();
            initForm();
        }

        function showToast() {
            const t = document.getElementById('toast');
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 1800);
        }

        // --- History ---
        function renderHistory() {
            const container = document.getElementById('historyList');
            if (records.length === 0) {
                container.innerHTML = '<div class="empty-state">暂无记录</div>';
                return;
            }
            const sorted = [...records].sort((a, b) => b.datetime.localeCompare(a.datetime));
            container.innerHTML = sorted.map(r => {
                const color = getIntensityColor(r.intensity);
                const label = getIntensityLabel(r.intensity);
                let details = '';
                if (r.duration) details += `持续 ${r.duration} 小时<br>`;
                if (r.medication) details += `用药: <span>${r.medication}</span><br>`;
                if (r.notes) details += `备注: <span>${r.notes}</span><br>`;
                const tags = [...(r.location || []), ...(r.symptoms || []), ...(r.triggers || [])];
                return `<div class="history-item">
                    <button class="hi-del" onclick="deleteEpisode(${r.id})">×</button>
                    <div class="hi-top">
                        <div class="hi-date">${formatDate(r.datetime)}</div>
                        <div class="hi-intensity" style="background:${color}22;color:${color}">${label} ${r.intensity}</div>
                    </div>
                    ${details ? `<div class="hi-details">${details}</div>` : ''}
                    ${tags.length ? `<div class="hi-tags">${tags.map(t => `<span class="hi-tag">${t}</span>`).join('')}</div>` : ''}
                </div>`;
            }).join('');
        }

        function deleteEpisode(id) {
            if (!confirm('确认删除此记录？')) return;
            records = records.filter(r => r.id !== id);
            saveRecords();
            renderHistory();
        }

        // --- Stats ---
        function renderStats() {
            const area = document.getElementById('statsArea');
            if (records.length === 0) {
                area.innerHTML = '<div class="empty-state">暂无数据</div>';
                return;
            }

            const avgIntensity = (records.reduce((s, r) => s + r.intensity, 0) / records.length).toFixed(1);
            const avgDuration = (records.reduce((s, r) => s + (r.duration || 0), 0) / records.length).toFixed(1);

            const now = new Date();
            const thisMonth = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
            const monthCount = records.filter(r => r.datetime.slice(0, 7) === thisMonth).length;

            let html = `<div class="stat-grid">
                <div class="stat-card"><div class="sc-val">${records.length}</div><div class="sc-label">总次数</div></div>
                <div class="stat-card"><div class="sc-val" style="color:${getIntensityColor(avgIntensity)}">${avgIntensity}</div><div class="sc-label">平均强度</div></div>
                <div class="stat-card"><div class="sc-val">${avgDuration}h</div><div class="sc-label">平均时长</div></div>
                <div class="stat-card"><div class="sc-val">${monthCount}</div><div class="sc-label">本月次数</div></div>
            </div>`;

            html += renderBarSection('常见诱因', getFieldFrequency('triggers'));
            html += renderBarSection('头痛位置', getFieldFrequency('location'));
            html += renderBarSection('伴随症状', getFieldFrequency('symptoms'));

            area.innerHTML = html;
        }

        function getFieldFrequency(field) {
            const counts = {};
            records.forEach(r => {
                (r[field] || []).forEach(v => { counts[v] = (counts[v] || 0) + 1; });
            });
            return Object.entries(counts)
                .map(([value, count]) => ({ value, count }))
                .sort((a, b) => b.count - a.count);
        }

        function renderBarSection(title, data) {
            if (data.length === 0) return '';
            const max = data[0].count;
            return `<div class="stat-section"><h3>${title}</h3>${data.map(d =>
                `<div class="stat-bar-row">
                    <div class="stat-bar-label">${d.value}</div>
                    <div class="stat-bar-track"><div class="stat-bar-fill" style="width:${(d.count / max * 100)}%"></div></div>
                    <div class="stat-bar-count">${d.count}</div>
                </div>`
            ).join('')}</div>`;
        }

        // --- Utility ---
        function formatDate(dt) {
            if (!dt) return '';
            const d = new Date(dt);
            return `${d.getFullYear()}年${d.getMonth() + 1}月${d.getDate()}日 ${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
        }

        // --- Init ---
        document.addEventListener('DOMContentLoaded', () => {
            loadRecords();
            initForm();
        });
    </script>
</body>
</html>
