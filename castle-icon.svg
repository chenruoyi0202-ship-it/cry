<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c084fc"/>
      <stop offset="100%" style="stop-color:#f9a8d4"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#g)"/>
  <!-- Castle body -->
  <rect x="156" y="240" width="200" height="180" rx="4" fill="#fff" opacity="0.95"/>
  <!-- Left tower -->
  <rect x="126" y="180" width="60" height="240" rx="4" fill="#fff" opacity="0.95"/>
  <polygon points="126,180 156,120 186,180" fill="#fff" opacity="0.95"/>
  <!-- Right tower -->
  <rect x="326" y="180" width="60" height="240" rx="4" fill="#fff" opacity="0.95"/>
  <polygon points="326,180 356,120 386,180" fill="#fff" opacity="0.95"/>
  <!-- Center tower -->
  <rect x="216" y="160" width="80" height="260" rx="4" fill="#fff" opacity="0.95"/>
  <polygon points="216,160 256,90 296,160" fill="#fff" opacity="0.95"/>
  <!-- Door -->
  <rect x="232" y="340" width="48" height="80" rx="24" fill="url(#g)" opacity="0.6"/>
  <!-- Windows -->
  <circle cx="156" cy="240" r="12" fill="url(#g)" opacity="0.5"/>
  <circle cx="356" cy="240" r="12" fill="url(#g)" opacity="0.5"/>
  <circle cx="256" cy="220" r="14" fill="url(#g)" opacity="0.5"/>
  <circle cx="236" cy="280" r="8" fill="url(#g)" opacity="0.4"/>
  <circle cx="276" cy="280" r="8" fill="url(#g)" opacity="0.4"/>
  <!-- Flag -->
  <line x1="256" y1="90" x2="256" y2="55" stroke="#fff" stroke-width="3"/>
  <polygon points="256,55 285,65 256,75" fill="#ffd700"/>
  <!-- Sparkles -->
  <text x="130" y="110" font-size="28" opacity="0.8">✨</text>
  <text x="350" y="140" font-size="22" opacity="0.7">⭐</text>
  <text x="100" y="350" font-size="20" opacity="0.5">✨</text>
  <text x="390" y="380" font-size="24" opacity="0.6">💫</text>
</svg>
