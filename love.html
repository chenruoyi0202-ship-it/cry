<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="robots" content="noindex, nofollow">
    <meta name="theme-color" content="#fef6ff">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta property="og:title" content="Our Memory">
    <meta property="og:description" content="c ✨ x">
    <meta property="og:image" content="https://chenruoyi0202-ship-it.github.io/cry/castle-icon.png">
    <meta property="og:type" content="website">
    <link rel="icon" type="image/svg+xml" href="castle-icon.svg">
    <link rel="apple-touch-icon" href="castle-icon.png">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <title>Our Memory</title>
    <style>
        :root {
            --bg: #fef6ff; --card: #ffffff; --text: #2d1b4e; --text2: #8b7a9e;
            --text3: #5a4a6c; --accent: #c084fc; --accent2: #f9a8d4; --border: #e8daf0;
            --card-shadow: rgba(192,132,252,0.12); --lock-bg: linear-gradient(135deg, #fef6ff 0%, #f0e6ff 30%, #fce4ec 60%, #e8d5f5 100%);
            --glow: 0 0 20px rgba(192,132,252,0.15); --sparkle: #ffd700;
        }
        [data-theme="dark"] {
            --bg: #0f0a1a; --card: #1a1030; --text: #e8e0f0; --text2: #a090c0;
            --text3: #c0b0d8; --accent: #c084fc; --accent2: #f9a8d4; --border: #2a1a4e;
            --card-shadow: rgba(0,0,0,0.4); --lock-bg: linear-gradient(135deg, #0f0a1a 0%, #1a1030 30%, #261845 60%, #1a0a30 100%);
            --glow: 0 0 20px rgba(192,132,252,0.25); --sparkle: #ffd700;
        }
        [data-theme="dark"] .modal { background: var(--card); }
        [data-theme="dark"] .modal h3 { color: var(--accent); }
        [data-theme="dark"] .modal label { color: var(--text2); }
        [data-theme="dark"] .modal input, [data-theme="dark"] .modal textarea, [data-theme="dark"] .modal select {
            background: var(--bg); color: var(--text); border-color: var(--border);
        }
        [data-theme="dark"] .save-bar { background: var(--card); border-color: var(--border); }
        [data-theme="dark"] .btn-secondary { background: var(--border); color: var(--text); }
        [data-theme="dark"] .lock-input { background: rgba(22,33,62,0.8); color: var(--text); border-color: var(--border); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { touch-action: manipulation; -ms-touch-action: manipulation; background: var(--bg); }
        body {
            -webkit-text-size-adjust: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }
        /* Lock Screen */
        #lockScreen {
            position: fixed; inset: 0; z-index: 1000;
            background: var(--lock-bg);
            display: none; flex-direction: column; align-items: center; justify-content: center;
        }
        #lockScreen.show { display: flex; }
        #lockScreen.hidden { display: none; }
        .lock-heart { font-size: 72px; margin-bottom: 16px; animation: heartbeat 1.5s ease-in-out infinite; filter: drop-shadow(0 0 12px rgba(192,132,252,0.5)); }
        .lock-sub { font-size: 20px; color: var(--accent); letter-spacing: 6px; margin-bottom: 28px; font-weight: 300; }
        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            15% { transform: scale(1.15); }
            30% { transform: scale(1); }
            45% { transform: scale(1.1); }
        }
        .lock-input-wrap {
            display: flex; flex-direction: column; align-items: center; gap: 16px; width: 300px;
        }
        .lock-input {
            width: 100%; padding: 14px 20px; border: 2px solid var(--border); border-radius: 30px;
            background: rgba(255,255,255,0.8); font-size: 16px; text-align: center; color: var(--text);
            outline: none; transition: border-color 0.3s;
        }
        .lock-input:focus { border-color: var(--accent); }
        .lock-btn {
            width: 100%; padding: 14px; border: none; border-radius: 30px; cursor: pointer;
            background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff;
            font-size: 16px; font-weight: 600; transition: opacity 0.3s, transform 0.3s;
            box-shadow: 0 4px 20px rgba(192,132,252,0.4);
        }
        .lock-btn:hover { opacity: 0.9; transform: scale(1.02); }
        .lock-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .lock-error { color: #e74c3c; font-size: 14px; min-height: 20px; }
        /* Floating Hearts */
        .floating-hearts { position: fixed; inset: 0; pointer-events: none; overflow: hidden; z-index: 999; display: none; }
        .fh {
            position: absolute; bottom: -40px; font-size: 20px; opacity: 0.6;
            animation: floatUp linear infinite;
        }
        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 0.6; }
            100% { transform: translateY(-110vh) rotate(45deg); opacity: 0; }
        }
        .fh:nth-child(1) { left: 5%; font-size: 14px; animation-duration: 8s; animation-delay: 0s; }
        .fh:nth-child(2) { left: 18%; font-size: 20px; animation-duration: 10s; animation-delay: 1s; }
        .fh:nth-child(3) { left: 32%; font-size: 10px; animation-duration: 7s; animation-delay: 3s; }
        .fh:nth-child(4) { left: 50%; font-size: 24px; animation-duration: 12s; animation-delay: 2s; }
        .fh:nth-child(5) { left: 65%; font-size: 16px; animation-duration: 9s; animation-delay: 4s; }
        .fh:nth-child(6) { left: 80%; font-size: 18px; animation-duration: 11s; animation-delay: 0.5s; }
        .fh:nth-child(7) { left: 42%; font-size: 12px; animation-duration: 8.5s; animation-delay: 5s; }
        .fh:nth-child(8) { left: 92%; font-size: 14px; animation-duration: 9.5s; animation-delay: 1.5s; }
        .fh:nth-child(9) { left: 10%; font-size: 22px; animation-duration: 13s; animation-delay: 6s; }

        /* Main Content */
        #app { display: none; max-width: 800px; margin: 0 auto; padding: 20px 16px 40px; }
        #app.show { display: block; }

        /* Header */
        .app-header { text-align: center; padding: 24px 0 0; position: relative; }
        .couple-names { font-size: 28px; font-weight: 700; color: var(--accent); text-transform: lowercase; position: relative; }

        /* Tab Bar */
        .tab-bar {
            display: flex; position: sticky; top: 0; z-index: 50;
            background: var(--card); border-bottom: 1px solid var(--border);
            box-shadow: 0 2px 8px var(--card-shadow); margin: 12px -16px 0;
        }
        .tab-btn {
            flex: 1; padding: 12px 0; border: none; background: none; cursor: pointer;
            font-size: 14px; font-weight: 600; color: var(--text2);
            border-bottom: 3px solid transparent; transition: all 0.3s; font-family: inherit;
        }
        .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
        .tab-content { overflow: hidden; }
        .tab-panel { display: none; padding: 20px 0; min-height: 50vh; }
        .tab-panel.active { display: block; }

        /* Edit toggle */
        .edit-toggle {
            position: fixed; bottom: 24px; right: 20px; z-index: 100;
            width: 52px; height: 52px; border-radius: 50%; border: none; cursor: pointer;
            background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff;
            box-shadow: 0 4px 20px rgba(192,132,252,0.5);
            font-size: 22px; display: none; align-items: center; justify-content: center;
            transition: transform 0.3s;
        }
        .edit-toggle.show { display: flex; }
        .edit-toggle.active { transform: rotate(45deg); background: #e74c3c; }

        /* Section */
        .section { margin-bottom: 36px; }
        .section-title {
            font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 16px;
            padding-left: 12px; border-left: 4px solid var(--accent);
        }
        .add-btn {
            display: none; margin: 12px 0; padding: 10px 20px;
            border: 2px dashed var(--accent); border-radius: 12px; background: transparent;
            color: var(--accent); font-size: 14px; font-weight: 600; cursor: pointer;
            width: 100%; transition: background 0.3s;
        }
        .add-btn:hover { background: rgba(232,117,143,0.08); }
        .editing .add-btn { display: block; }

        /* Anniversary Cards */
        .ann-scroll {
            display: flex; gap: 14px; overflow-x: auto; padding: 4px 0 12px;
            scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch;
        }
        .ann-scroll::-webkit-scrollbar { height: 4px; }
        .ann-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
        .ann-card {
            flex: 0 0 160px; scroll-snap-align: start; position: relative;
            background: var(--card); border-radius: 20px; padding: 20px 16px; text-align: center;
            box-shadow: var(--glow), 0 4px 20px var(--card-shadow);
            border: 1px solid var(--border); transition: transform 0.3s, box-shadow 0.3s;
        }
        .ann-card:hover { transform: translateY(-3px); box-shadow: 0 0 30px rgba(192,132,252,0.2), 0 8px 24px var(--card-shadow); }
        .ann-icon { font-size: 32px; margin-bottom: 8px; }
        .ann-title { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
        .ann-date { font-size: 12px; color: var(--text2); margin-bottom: 8px; }
        .ann-days { font-size: 20px; font-weight: 800; color: var(--accent); }
        .ann-days-label { font-size: 11px; color: var(--text2); }
        .item-del {
            display: none; position: absolute; top: 8px; right: 8px; z-index: 3;
            width: 28px; height: 28px; border-radius: 50%; border: none;
            background: rgba(220,50,50,0.85); color: #fff; font-size: 16px; cursor: pointer;
            align-items: center; justify-content: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        .editing .item-del { display: flex; }
        .item-move {
            display: none; position: absolute; bottom: 8px; z-index: 3;
            width: 32px; height: 32px; border-radius: 50%; border: none;
            background: rgba(0,0,0,0.6); color: #fff; font-size: 16px; cursor: pointer;
            align-items: center; justify-content: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        .item-move-l { left: 8px; }
        .item-move-r { right: 8px; }
        .editing .item-move { display: flex; }

        /* Timeline */
        .timeline { position: relative; padding-left: 28px; }
        .timeline::before {
            content: ''; position: absolute; left: 8px; top: 0; bottom: 0;
            width: 2px; background: linear-gradient(to bottom, var(--accent), var(--accent2));
        }
        .tl-entry { position: relative; margin-bottom: 28px; }
        .tl-dot {
            position: absolute; left: -24px; top: 4px;
            width: 16px; height: 16px; border-radius: 50%;
            background: var(--accent); border: 3px solid var(--bg);
            display: flex; align-items: center; justify-content: center;
            font-size: 8px; color: #fff;
        }
        .tl-date {
            display: inline-block; font-size: 12px; color: #fff; background: var(--accent);
            padding: 2px 10px; border-radius: 10px; margin-bottom: 8px;
        }
        .tl-card {
            background: var(--card); border-radius: 18px; padding: 16px; position: relative;
            box-shadow: var(--glow), 0 4px 16px var(--card-shadow);
            border: 1px solid var(--border);
        }
        .tl-title { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
        .tl-content { font-size: 14px; color: var(--text3); line-height: 1.6; }
        .tl-photos { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
        .tl-thumb {
            width: 72px; height: 72px; border-radius: 10px; object-fit: cover; cursor: pointer;
            transition: transform 0.3s;
        }
        .tl-thumb:hover { transform: scale(1.05); }

        /* Photo Gallery */
        .gallery {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px;
        }
        @media (min-width: 640px) { .gallery { grid-template-columns: repeat(3, 1fr); } }
        .gallery-item {
            position: relative; border-radius: 16px; overflow: hidden; cursor: pointer;
            aspect-ratio: 1; background: var(--border);
            box-shadow: var(--glow), 0 2px 12px var(--card-shadow);
        }
        .gallery-item img {
            width: 100%; height: 100%; object-fit: cover; transition: transform 0.4s;
        }
        .gallery-item:hover img { transform: scale(1.05); }

        /* Lightbox */
        .lightbox {
            display: none; position: fixed; inset: 0; z-index: 2000;
            background: rgba(0,0,0,0.85); align-items: center; justify-content: center;
            flex-direction: column; padding: 20px;
        }
        .lightbox.open { display: flex; }
        .lb-close {
            position: absolute; top: 16px; right: 16px;
            background: none; border: none; color: #fff; font-size: 32px; cursor: pointer;
        }
        .lb-img { max-width: 90vw; max-height: 70vh; border-radius: 8px; object-fit: contain; }
        .lb-info { color: #fff; text-align: center; margin-top: 12px; font-size: 14px; }
        .lb-info .lb-cap { font-weight: 600; }
        .lb-info .lb-date { color: #ccc; font-size: 12px; margin-top: 4px; }
        .lb-nav {
            position: absolute; top: 50%; transform: translateY(-50%);
            background: rgba(255,255,255,0.2); border: none; color: #fff;
            font-size: 28px; width: 48px; height: 48px; border-radius: 50%;
            cursor: pointer; transition: background 0.3s;
        }
        .lb-nav:hover { background: rgba(255,255,255,0.4); }
        .lb-prev { left: 12px; }
        .lb-next { right: 12px; }

        /* Modals / Forms */
        .modal-overlay {
            display: none; position: fixed; inset: 0; z-index: 1500;
            background: rgba(0,0,0,0.4); align-items: center; justify-content: center; padding: 20px;
        }
        .modal-overlay.open { display: flex; }
        .modal {
            background: #fff; border-radius: 20px; padding: 28px 24px; width: 100%; max-width: 420px;
            max-height: 80vh; overflow-y: auto;
        }
        .modal h3 { font-size: 18px; color: #e8758f; margin-bottom: 16px; }
        .modal label { display: block; font-size: 13px; font-weight: 600; color: #8c7a7c; margin-bottom: 4px; margin-top: 12px; }
        .modal input, .modal textarea, .modal select {
            width: 100%; max-width: 100%; padding: 10px 14px; border: 1.5px solid #f0e0d6; border-radius: 10px;
            font-size: 16px; outline: none; transition: border-color 0.3s; font-family: inherit;
            box-sizing: border-box; -webkit-appearance: none; appearance: none;
        }
        .modal input:focus, .modal textarea:focus { border-color: #e8758f; }
        .modal textarea { resize: vertical; min-height: 80px; }
        .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
        .modal-actions button {
            flex: 1; padding: 12px; border: none; border-radius: 12px;
            font-size: 14px; font-weight: 600; cursor: pointer; transition: opacity 0.3s;
        }
        .btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; }
        .btn-secondary { background: #f0e0d6; color: #3d2c2e; }

        /* Save Bar */
        .save-bar {
            display: none; position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
            background: #fff; border-top: 1px solid #f0e0d6; padding: 12px 20px;
            text-align: center; box-shadow: 0 -4px 20px rgba(0,0,0,0.06);
        }
        .save-bar.show { display: flex; gap: 10px; justify-content: center; }
        .save-bar button { padding: 12px 32px; border: none; border-radius: 12px; font-size: 14px; font-weight: 600; cursor: pointer; }
        .save-bar .save-status { font-size: 12px; color: #8c7a7c; align-self: center; }


        /* Emoji Picker */
        .emoji-picker { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; max-height: 180px; overflow-y: auto; padding: 4px 0; }
        .emoji-opt {
            width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
            font-size: 22px; border-radius: 10px; cursor: pointer; border: 2px solid transparent;
            background: rgba(232,117,143,0.06); transition: all 0.2s;
        }
        .emoji-opt:hover { background: rgba(232,117,143,0.15); }
        .emoji-opt.selected { border-color: #e8758f; background: rgba(232,117,143,0.15); }

        /* Toast */
        .toast {
            position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
            background: #4caf50; color: #fff; padding: 10px 28px; border-radius: 30px;
            font-size: 14px; font-weight: 600; z-index: 3000; opacity: 0;
            animation: toastIn 0.3s forwards, toastOut 0.3s 1.7s forwards;
            pointer-events: none;
        }
        @keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(20px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
        @keyframes toastOut { from { opacity: 1; } to { opacity: 0; } }

        /* Skeleton shimmer for gallery */
        .gallery-item.skeleton {
            background: linear-gradient(90deg, #f0e0d6 25%, #fdf6f0 50%, #f0e0d6 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        [data-theme="dark"] .gallery-item.skeleton {
            background: linear-gradient(90deg, #16213e 25%, #1a1a2e 50%, #16213e 75%);
            background-size: 200% 100%;
        }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        /* Pull to refresh */
        .ptr-indicator {
            position: fixed; top: 0; left: 50%; transform: translateX(-50%);
            background: var(--accent); color: #fff; padding: 8px 20px; border-radius: 0 0 12px 12px;
            font-size: 13px; font-weight: 600; z-index: 200; display: none;
        }
        .ptr-indicator.show { display: block; }

        /* Theme toggle */
        .theme-toggle {
            position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
            width: 36px; height: 36px; border-radius: 50%; border: none; cursor: pointer;
            background: rgba(232,117,143,0.1); font-size: 18px; display: flex;
            align-items: center; justify-content: center; transition: background 0.3s;
        }
        .theme-toggle:hover { background: rgba(232,117,143,0.2); }

        /* Footer */
        .app-footer { text-align: center; padding: 32px 0 20px; color: #c4b0b2; font-size: 13px; }

        /* Init screen */
        .init-screen { text-align: center; padding: 60px 20px; color: #8c7a7c; }
        .init-screen p { margin-bottom: 16px; line-height: 1.6; }
    </style>
</head>
<body>
    <!-- Floating Hearts -->
    <div class="floating-hearts" id="floatingHearts">
        <div class="fh">&#x2728;</div><div class="fh">&#x2B50;</div>
        <div class="fh">&#x1F49C;</div><div class="fh">&#x2728;</div>
        <div class="fh">&#x1F4AB;</div><div class="fh">&#x2B50;</div>
        <div class="fh">&#x2728;</div><div class="fh">&#x1F49C;</div>
        <div class="fh">&#x2B50;</div>
    </div>

    <!-- Lock Screen -->
    <div id="lockScreen">
        <div class="lock-heart">&#x1F3F0;</div>
        <div class="lock-sub">c &#x2728; x</div>
        <div class="lock-input-wrap">
            <input type="password" class="lock-input" id="pwdInput" placeholder="输入密码解锁" autocomplete="off">
            <button class="lock-btn" id="unlockBtn" onclick="doUnlock()">解锁</button>
            <div class="lock-error" id="lockError"></div>
        </div>
    </div>

    <!-- Pull to Refresh Indicator -->
    <div class="ptr-indicator" id="ptrIndicator">释放刷新</div>

    <!-- Edit Toggle (FAB) -->
    <button class="edit-toggle" id="editToggle" onclick="toggleEdit()">&#x270F;&#xFE0F;</button>

    <!-- Main App -->
    <div id="app">
        <header class="app-header">
            <div class="couple-names" id="coupleNames"></div>
            <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()">🌙</button>
        </header>

        <div class="tab-bar">
            <button class="tab-btn active" onclick="switchTab(0)">纪念日</button>
            <button class="tab-btn" onclick="switchTab(1)">点滴</button>
            <button class="tab-btn" onclick="switchTab(2)">相册</button>
        </div>

        <div class="tab-content" id="tabContent">
            <!-- Tab 0: Anniversaries -->
            <div class="tab-panel active" id="tabAnn">
                <div class="ann-scroll" id="annScroll"></div>
                <button class="add-btn" onclick="openModal('ann')">+ 添加纪念日</button>
            </div>

            <!-- Tab 1: Diary -->
            <div class="tab-panel" id="tabDiary">
                <div class="timeline" id="timeline"></div>
                <button class="add-btn" onclick="openModal('diary')">+ 添加记录</button>
            </div>

            <!-- Tab 2: Photos -->
            <div class="tab-panel" id="tabPhoto">
                <div class="gallery" id="gallery"></div>
                <button class="add-btn" onclick="openModal('photo')">+ 添加照片</button>
            </div>

        </div>

        <footer class="app-footer">Made with &#x2764;&#xFE0F;</footer>
    </div>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox">
        <button class="lb-close" onclick="closeLightbox()">&times;</button>
        <button class="lb-nav lb-prev" onclick="navLightbox(-1)">&#x276E;</button>
        <button class="lb-nav lb-next" onclick="navLightbox(1)">&#x276F;</button>
        <img class="lb-img" id="lbImg" src="" alt="">
        <div class="lb-info"><div class="lb-cap" id="lbCap"></div><div class="lb-date" id="lbDate"></div></div>
    </div>

    <!-- Save Bar -->
    <div class="save-bar" id="saveBar">
        <button class="btn-secondary" onclick="toggleEdit()">取消</button>
        <button class="btn-primary" id="saveBtn" onclick="saveData()">保存</button>
        <span class="save-status" id="saveStatus"></span>
    </div>

    <!-- Modal -->
    <div class="modal-overlay" id="modalOverlay" onclick="event.target===this&&closeModal()">
        <div class="modal" id="modalContent"></div>
    </div>

    <script>
    // Disable pinch zoom
    document.addEventListener('gesturestart', e => e.preventDefault());
    document.addEventListener('gesturechange', e => e.preventDefault());
    document.addEventListener('gestureend', e => e.preventDefault());

    // ===== State =====
    let appData = null;
    let isEditing = false;
    let currentPwd = null;
    let currentLbIndex = 0;
    let dirty = false;

    // ===== Crypto =====
    async function deriveKey(password, salt) {
        const enc = new TextEncoder();
        const km = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
        return crypto.subtle.deriveKey(
            { name: 'PBKDF2', salt, iterations: 200000, hash: 'SHA-256' },
            km, { name: 'AES-GCM', length: 256 }, false, ['encrypt', 'decrypt']
        );
    }
    // Safe base64 encode/decode for large data
    function bufToB64(buf) {
        const arr = new Uint8Array(buf);
        let s = '';
        for (let i = 0; i < arr.length; i++) s += String.fromCharCode(arr[i]);
        return btoa(s);
    }
    function b64ToBuf(b64) {
        const s = atob(b64);
        const buf = new Uint8Array(s.length);
        for (let i = 0; i < s.length; i++) buf[i] = s.charCodeAt(i);
        return buf;
    }

    async function decryptData(password, b64) {
        const buf = b64ToBuf(b64);
        const salt = buf.slice(0, 16), iv = buf.slice(16, 28), ct = buf.slice(28);
        const key = await deriveKey(password, salt);
        const plain = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, ct);
        return JSON.parse(new TextDecoder().decode(plain));
    }
    async function encryptData(password, data) {
        const salt = crypto.getRandomValues(new Uint8Array(16));
        const iv = crypto.getRandomValues(new Uint8Array(12));
        const key = await deriveKey(password, salt);
        const ct = await crypto.subtle.encrypt(
            { name: 'AES-GCM', iv }, key, new TextEncoder().encode(JSON.stringify(data))
        );
        const combined = new Uint8Array(28 + ct.byteLength);
        combined.set(salt, 0); combined.set(iv, 16); combined.set(new Uint8Array(ct), 28);
        return bufToB64(combined);
    }

    // ===== Password storage (4 layers: window.name + localStorage + sessionStorage + cookie) =====
    const _ck = location.protocol === 'https:' ? ';Secure' : '';
    const _WN = '_lp:';
    function savePwd(p) {
        try { window.name = _WN + p; } catch(e) {}
        try { localStorage.setItem('_lp', p); } catch(e) {}
        try { sessionStorage.setItem('_lp', p); } catch(e) {}
        try { document.cookie = '_lp=' + encodeURIComponent(p) + ';max-age=31536000;path=/' + _ck + ';SameSite=Lax'; } catch(e) {}
    }
    function getPwd() {
        try { if (window.name && window.name.startsWith(_WN)) return window.name.slice(_WN.length); } catch(e) {}
        try { const v = localStorage.getItem('_lp'); if (v) return v; } catch(e) {}
        try { const v = sessionStorage.getItem('_lp'); if (v) return v; } catch(e) {}
        try { const m = document.cookie.match(/(?:^|;\s*)_lp=([^;]*)/); if (m) return decodeURIComponent(m[1]); } catch(e) {}
        return '';
    }
    function clearPwd() {
        try { window.name = ''; } catch(e) {}
        try { localStorage.removeItem('_lp'); } catch(e) {}
        try { sessionStorage.removeItem('_lp'); } catch(e) {}
        try { document.cookie = '_lp=;max-age=0;path=/' + _ck; } catch(e) {}
    }

    // ===== Data cache (localStorage, with quota handling) =====
    function cacheData(jsonStr) {
        try {
            localStorage.setItem('_ld', jsonStr);
        } catch(e) {
            // Quota exceeded — clear data cache only, never touch _lp
            try { localStorage.removeItem('_ld'); } catch(e2) {}
            try { localStorage.setItem('_ld', jsonStr); } catch(e2) { /* give up */ }
        }
    }
    function getCachedData() {
        try {
            const c = localStorage.getItem('_ld');
            if (c) return JSON.parse(c);
        } catch(e) {}
        return null;
    }

    // ===== Unlock =====
    document.getElementById('pwdInput').addEventListener('keydown', e => { if (e.key === 'Enter') doUnlock(); });

    async function tryUnlock(pwd, isAuto) {
        // Try cached data first
        let json = getCachedData();
        if (json) {
            try {
                appData = await decryptData(pwd, json.encrypted);
                currentPwd = pwd; savePwd(pwd);
                showApp(); renderAll();
                // Background: check GitHub API for newer data
                syncFromGitHub(pwd);
                return true;
            } catch(e) {
                try { localStorage.removeItem('_ld'); } catch(e2) {}
            }
        }
        // Fetch from GitHub API first (always latest), then Pages as fallback
        json = await fetchFromGitHubAPI();
        if (!json) {
            try {
                const resp = await fetch('data/love_encrypted.json?v=' + Date.now());
                if (resp.ok) json = await resp.json();
            } catch(e) {}
        }
        if (!json) {
            // No data anywhere — first time use
            appData = {
                version: 1,
                couple: { person1: 'CRY', person2: 'XYX' },
                anniversaries: [], diary: [], photos: []
            };
            currentPwd = pwd; savePwd(pwd);
            showApp(); renderAll();
            if (!isAuto) toggleEdit();
            return true;
        }
        try {
            appData = await decryptData(pwd, json.encrypted);
            cacheData(JSON.stringify(json));
            currentPwd = pwd; savePwd(pwd);
            showApp(); renderAll();
            return true;
        } catch(e) {
            return false;
        }
    }

    // Fetch latest data from GitHub API (no deploy delay)
    async function fetchFromGitHubAPI() {
        try {
            // Use token from appData if available, otherwise try from cached data
            let token = (appData && appData._ghToken) || '';
            let repo = (appData && appData._ghRepo) || '';
            if (!token || !repo) {
                // Try to extract from cached data by reading raw
                const cached = getCachedData();
                if (cached) {
                    const pwd = currentPwd || getPwd();
                    if (pwd) {
                        try {
                            const tmp = await decryptData(pwd, cached.encrypted);
                            token = tmp._ghToken || '';
                            repo = tmp._ghRepo || '';
                        } catch(e) {}
                    }
                }
            }
            if (!token || !repo) return null;
            const resp = await fetch('https://api.github.com/repos/' + repo + '/contents/data/love_encrypted.json', {
                headers: { 'Authorization': 'Bearer ' + token, 'Accept': 'application/vnd.github.v3+json' }
            });
            if (!resp.ok) return null;
            const fileInfo = await resp.json();
            // GitHub API returns base64-encoded content
            const raw = atob(fileInfo.content.replace(/\n/g, ''));
            return JSON.parse(raw);
        } catch(e) { return null; }
    }

    // Background sync: check GitHub for newer data after unlock
    async function syncFromGitHub(pwd) {
        try {
            const remote = await fetchFromGitHubAPI();
            if (!remote) return;
            // Compare timestamps
            const localTime = appData._updatedAt || '';
            const remoteTime = remote.updatedAt || '';
            if (remoteTime > localTime) {
                const newData = await decryptData(pwd, remote.encrypted);
                appData = newData;
                appData._updatedAt = remoteTime;
                cacheData(JSON.stringify(remote));
                renderAll();
            }
        } catch(e) {}
    }

    async function doUnlock() {
        const pwd = document.getElementById('pwdInput').value;
        if (!pwd) return;
        const btn = document.getElementById('unlockBtn');
        const err = document.getElementById('lockError');
        btn.disabled = true; btn.textContent = '解锁中...'; err.textContent = '';

        const ok = await tryUnlock(pwd, false);
        if (!ok) err.textContent = '密码错误，请重试';
        btn.disabled = false; btn.textContent = '解锁';
    }

    // Check crypto support
    if (!window.crypto || !window.crypto.subtle) {
        document.body.innerHTML = '<div style="padding:40px;text-align:center;color:#e74c3c;font-size:16px;">当前浏览器不支持加密功能，请用 Safari 或 Chrome 打开</div>';
    }

    // Auto-unlock on refresh, or show lock screen
    (async function autoUnlock() {
        try {
            const savedPwd = getPwd();
            if (savedPwd) {
                // Try 1: with cache
                let ok = await tryUnlock(savedPwd, true);
                if (ok) return;
                // Try 2: clear cache, force network fetch
                try { localStorage.removeItem('_ld'); } catch(e2) {}
                ok = await tryUnlock(savedPwd, true);
                if (ok) return;
                // Still failed — pre-fill password, don't clear it
                document.getElementById('pwdInput').value = savedPwd;
            }
        } catch(e) {}
        // Show lock screen (password may be pre-filled)
        document.getElementById('lockScreen').classList.add('show');
        document.getElementById('floatingHearts').style.display = 'block';
    })();

    // Swipe detection on tab content
    (function() {
        const el = document.getElementById('tabContent');
        if (!el) return;
        let startX = 0, startY = 0;
        el.addEventListener('touchstart', e => { startX = e.touches[0].clientX; startY = e.touches[0].clientY; }, { passive: true });
        el.addEventListener('touchend', e => {
            const dx = e.changedTouches[0].clientX - startX;
            const dy = e.changedTouches[0].clientY - startY;
            if (Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy) * 1.5) {
                if (dx < 0 && currentTab < 2) switchTab(currentTab + 1);
                else if (dx > 0 && currentTab > 0) switchTab(currentTab - 1);
            }
        }, { passive: true });
    })();

        preview.innerHTML = '';
        files.forEach(file => {
            compressImage(file, (dataUrl) => {
                pendingPhotos.push(dataUrl);
                preview.innerHTML += '<img src="' + dataUrl + '" style="max-width:80px;max-height:80px;border-radius:8px;margin:4px;">';
            });
        });
    }
    function compressImage(file, cb) {
        const reader = new FileReader();
        reader.onload = function(e) {
            const img = new Image();
            img.onload = function() {
                const canvas = document.createElement('canvas');
                let w = img.width, h = img.height;
                const MAX = 1000;
                if (w > MAX) { h = Math.round(h * MAX / w); w = MAX; }
                if (h > MAX) { w = Math.round(w * MAX / h); h = MAX; }
                canvas.width = w; canvas.height = h;
                canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                cb(canvas.toDataURL('image/jpeg', 0.5));
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }

    function autoAddPhotos(e) {
        const files = Array.from(e.target.files);
        if (!files.length) return;
        const status = document.getElementById('mPhotoStatus');
        const preview = document.getElementById('mPhotoPreview');
        let done = 0;
        status.textContent = '处理中... 0/' + files.length;
        preview.innerHTML = '';
        files.forEach(file => {
            compressImage(file, (dataUrl) => {
                appData.photos.push({ id: genId(), data: dataUrl });
                done++;
                preview.innerHTML += '<img src="' + dataUrl + '" style="max-width:60px;max-height:60px;border-radius:8px;margin:4px;">';
                status.textContent = '处理中... ' + done + '/' + files.length;
                if (done === files.length) {
                    dirty = true;
                    status.textContent = '已添加 ' + files.length + ' 张照片';
                    setTimeout(() => { closeModal(); renderAll(); }, 500);
                }
            });
        });
    }

    function addPhoto() {
        if (!pendingPhotos.length) return alert('请先选择图片');
        pendingPhotos.forEach(data => {
            appData.photos.push({ id: genId(), data });
        });
        pendingPhotos = [];
        dirty = true; closeModal(); renderAll();
    }


    // ===== GitHub Config =====
    const GH_PATH = 'data/love_encrypted.json';

    function detectRepo() {
        const host = location.hostname;
        if (host.endsWith('.github.io')) {
            const owner = host.replace('.github.io', '');
            const repo = location.pathname.split('/')[1] || '';
            if (repo) return owner + '/' + repo;
        }
        return '';
    }
    const GH_REPO = detectRepo();

    function getToken() { return (appData && appData._ghToken) || ''; }
    function getRepo() { return (appData && appData._ghRepo) || GH_REPO; }

    function showApp() {
        document.getElementById('lockScreen').classList.remove('show');
        document.getElementById('lockScreen').classList.add('hidden');
        document.getElementById('floatingHearts').style.display = 'none';
        document.getElementById('editToggle').classList.add('show');
        document.getElementById('app').classList.add('show');
    }

    // ===== Push to GitHub =====
    async function pushToGitHub() {
        const pwd = currentPwd || getPwd();
        if (!pwd) return alert('密码已过期，请刷新重新登录');

        const token = getToken();
        const repo = getRepo();

        if (!token || !repo) {
            alert('GitHub Token 未配置，无法保存');
            return;
        }

        try {
            const now = new Date().toISOString();
            appData._updatedAt = now;
            const encrypted = await encryptData(pwd, appData);
            const output = JSON.stringify({ encrypted, updatedAt: now });
            const content = bufToB64(new TextEncoder().encode(output));

            // Get current file SHA (needed for update)
            const getResp = await fetch('https://api.github.com/repos/' + repo + '/contents/' + GH_PATH, {
                headers: { 'Authorization': 'Bearer ' + token, 'Accept': 'application/vnd.github.v3+json' }
            });
            let sha = '';
            if (getResp.ok) {
                const fileInfo = await getResp.json();
                sha = fileInfo.sha;
            }

            const body = { message: 'Update love data', content };
            if (sha) body.sha = sha;

            const putResp = await fetch('https://api.github.com/repos/' + repo + '/contents/' + GH_PATH, {
                method: 'PUT',
                headers: {
                    'Authorization': 'Bearer ' + token,
                    'Accept': 'application/vnd.github.v3+json',
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(body)
            });

            if (!putResp.ok) {
                const err = await putResp.json();
                throw new Error(err.message || 'GitHub API error');
            }

            // Cache locally so refresh doesn't need to wait for GitHub Pages deploy
            cacheData(output);
            dirty = false;
            return true;
        } catch (e) {
            alert('保存失败: ' + e.message);
            return false;
        }
    }

    // ===== Save (called from save bar) =====
    async function saveData() {
        const btn = document.getElementById('saveBtn');
        btn.disabled = true; btn.textContent = '保存中...';

        const ok = await pushToGitHub();
        btn.textContent = '保存';
        btn.disabled = false;
        if (ok) {
            showToast('已保存');
            toggleEdit();
        }
    }

    // ===== Toast =====
    function showToast(msg) {
        const t = document.createElement('div');
        t.className = 'toast';
        t.textContent = msg;
        document.body.appendChild(t);
        setTimeout(() => { t.remove(); }, 2000);
    }

    // ===== Dark Mode =====
    function toggleTheme() {
        const html = document.documentElement;
        const isDark = html.getAttribute('data-theme') === 'dark';
        const newTheme = isDark ? 'light' : 'dark';
        html.setAttribute('data-theme', newTheme === 'dark' ? 'dark' : '');
        if (newTheme === 'light') html.removeAttribute('data-theme');
        document.getElementById('themeToggle').textContent = newTheme === 'dark' ? '☀️' : '🌙';
        try { localStorage.setItem('_theme', newTheme); } catch(e) {}
        // Update meta theme-color
        const meta = document.querySelector('meta[name="theme-color"]');
        if (meta) meta.content = newTheme === 'dark' ? '#1a1a2e' : '#fdf6f0';
    }
    (function initTheme() {
        let saved = '';
        try { saved = localStorage.getItem('_theme'); } catch(e) {}
        if (!saved) {
            saved = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }
        if (saved === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
            const btn = document.getElementById('themeToggle');
            if (btn) btn.textContent = '☀️';
            const meta = document.querySelector('meta[name="theme-color"]');
            if (meta) meta.content = '#1a1a2e';
        }
    })();

    // ===== Pull to Refresh =====
    (function initPTR() {
        const el = document.getElementById('tabContent');
        if (!el) return;
        const indicator = document.getElementById('ptrIndicator');
        let startY = 0, pulling = false;
        el.addEventListener('touchstart', function(e) {
            if (window.scrollY === 0) { startY = e.touches[0].clientY; pulling = true; }
        }, { passive: true });
        el.addEventListener('touchmove', function(e) {
            if (!pulling) return;
            const dy = e.touches[0].clientY - startY;
            if (dy > 60 && window.scrollY === 0) {
                indicator.classList.add('show');
            } else {
                indicator.classList.remove('show');
            }
        }, { passive: true });
        el.addEventListener('touchend', function(e) {
            if (!pulling) return;
            pulling = false;
            if (indicator.classList.contains('show')) {
                indicator.textContent = '刷新中...';
                syncFromGitHub(currentPwd).then(() => {
                    renderAll();
                    indicator.classList.remove('show');
                    indicator.textContent = '释放刷新';
                    showToast('已刷新');
                }).catch(() => {
                    indicator.classList.remove('show');
                    indicator.textContent = '释放刷新';
                });
            }
        }, { passive: true });
    })();

    </script>
