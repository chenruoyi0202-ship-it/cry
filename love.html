<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="robots" content="noindex, nofollow">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <title>Our Memory</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { touch-action: manipulation; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background: #fdf6f0;
            color: #3d2c2e;
            min-height: 100vh;
            overflow-x: hidden;
        }
        /* Lock Screen */
        #lockScreen {
            position: fixed; inset: 0; z-index: 1000;
            background: linear-gradient(135deg, #fdf6f0 0%, #fce4ec 50%, #f8bbd0 100%);
            display: none; flex-direction: column; align-items: center; justify-content: center;
        }
        #lockScreen.show { display: flex; }
        #lockScreen.hidden { display: none; }
        .lock-heart { font-size: 64px; margin-bottom: 24px; animation: heartbeat 1.5s ease-in-out infinite; }
        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            15% { transform: scale(1.15); }
            30% { transform: scale(1); }
            45% { transform: scale(1.1); }
        }
        .lock-input-wrap {
            display: flex; flex-direction: column; align-items: center; gap: 16px; width: 300px;
        }
        .lock-input {
            width: 100%; padding: 14px 20px; border: 2px solid #f0e0d6; border-radius: 30px;
            background: rgba(255,255,255,0.8); font-size: 16px; text-align: center;
            outline: none; transition: border-color 0.3s;
        }
        .lock-input:focus { border-color: #e8758f; }
        .lock-btn {
            width: 100%; padding: 14px; border: none; border-radius: 30px; cursor: pointer;
            background: linear-gradient(135deg, #e8758f, #f4a261); color: #fff;
            font-size: 16px; font-weight: 600; transition: opacity 0.3s, transform 0.3s;
        }
        .lock-btn:hover { opacity: 0.9; transform: scale(1.02); }
        .lock-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .lock-error { color: #e74c3c; font-size: 14px; min-height: 20px; }
        /* Floating Hearts */
        .floating-hearts { position: fixed; inset: 0; pointer-events: none; overflow: hidden; z-index: 999; display: none; }
        .fh {
            position: absolute; bottom: -40px; font-size: 20px; opacity: 0.6;
            animation: floatUp linear infinite;
        }
        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 0.6; }
            100% { transform: translateY(-110vh) rotate(45deg); opacity: 0; }
        }
        .fh:nth-child(1) { left: 5%; font-size: 16px; animation-duration: 8s; animation-delay: 0s; }
        .fh:nth-child(2) { left: 20%; font-size: 24px; animation-duration: 10s; animation-delay: 1s; }
        .fh:nth-child(3) { left: 35%; font-size: 14px; animation-duration: 7s; animation-delay: 3s; }
        .fh:nth-child(4) { left: 55%; font-size: 28px; animation-duration: 12s; animation-delay: 2s; }
        .fh:nth-child(5) { left: 70%; font-size: 18px; animation-duration: 9s; animation-delay: 4s; }
        .fh:nth-child(6) { left: 85%; font-size: 22px; animation-duration: 11s; animation-delay: 0.5s; }
        .fh:nth-child(7) { left: 45%; font-size: 15px; animation-duration: 8.5s; animation-delay: 5s; }

        /* Main Content */
        #app { display: none; max-width: 800px; margin: 0 auto; padding: 20px 16px 40px; }
        #app.show { display: block; }

        /* Header */
        .app-header { text-align: center; padding: 24px 0 0; }
        .couple-names { font-size: 28px; font-weight: 700; color: #e8758f; }

        /* Tab Bar */
        .tab-bar {
            display: flex; position: sticky; top: 0; z-index: 50;
            background: #fff; border-bottom: 1px solid #f0e0d6;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04); margin: 12px -16px 0;
        }
        .tab-btn {
            flex: 1; padding: 12px 0; border: none; background: none; cursor: pointer;
            font-size: 14px; font-weight: 600; color: #8c7a7c;
            border-bottom: 3px solid transparent; transition: all 0.3s; font-family: inherit;
        }
        .tab-btn.active { color: #e8758f; border-bottom-color: #e8758f; }
        .tab-content { overflow: hidden; }
        .tab-panel { display: none; padding: 20px 0; min-height: 50vh; }
        .tab-panel.active { display: block; }

        /* Edit toggle */
        .edit-toggle {
            position: fixed; bottom: 24px; right: 20px; z-index: 100;
            width: 52px; height: 52px; border-radius: 50%; border: none; cursor: pointer;
            background: linear-gradient(135deg, #e8758f, #f4a261); color: #fff;
            box-shadow: 0 4px 16px rgba(232,117,143,0.4);
            font-size: 22px; display: none; align-items: center; justify-content: center;
            transition: transform 0.3s;
        }
        .edit-toggle.show { display: flex; }
        .edit-toggle.active { transform: rotate(45deg); background: #e74c3c; }

        /* Section */
        .section { margin-bottom: 36px; }
        .section-title {
            font-size: 18px; font-weight: 700; color: #3d2c2e; margin-bottom: 16px;
            padding-left: 12px; border-left: 4px solid #e8758f;
        }
        .add-btn {
            display: none; margin: 12px 0; padding: 10px 20px;
            border: 2px dashed #e8758f; border-radius: 12px; background: transparent;
            color: #e8758f; font-size: 14px; font-weight: 600; cursor: pointer;
            width: 100%; transition: background 0.3s;
        }
        .add-btn:hover { background: rgba(232,117,143,0.08); }
        .editing .add-btn { display: block; }

        /* Anniversary Cards */
        .ann-scroll {
            display: flex; gap: 14px; overflow-x: auto; padding: 4px 0 12px;
            scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch;
        }
        .ann-scroll::-webkit-scrollbar { height: 4px; }
        .ann-scroll::-webkit-scrollbar-thumb { background: #f0e0d6; border-radius: 2px; }
        .ann-card {
            flex: 0 0 160px; scroll-snap-align: start; position: relative;
            background: #fff; border-radius: 16px; padding: 20px 16px; text-align: center;
            box-shadow: 0 2px 16px rgba(232,117,143,0.1);
            border: 1px solid rgba(232,117,143,0.1); transition: transform 0.3s;
        }
        .ann-card:hover { transform: translateY(-2px); }
        .ann-icon { font-size: 32px; margin-bottom: 8px; }
        .ann-title { font-size: 14px; font-weight: 600; color: #3d2c2e; margin-bottom: 4px; }
        .ann-date { font-size: 12px; color: #8c7a7c; margin-bottom: 8px; }
        .ann-days { font-size: 20px; font-weight: 800; color: #e8758f; }
        .ann-days-label { font-size: 11px; color: #8c7a7c; }
        .item-del {
            display: none; position: absolute; top: 6px; right: 6px;
            width: 24px; height: 24px; border-radius: 50%; border: none;
            background: #e74c3c; color: #fff; font-size: 14px; cursor: pointer;
            align-items: center; justify-content: center;
        }
        .editing .item-del { display: flex; }

        /* Timeline */
        .timeline { position: relative; padding-left: 28px; }
        .timeline::before {
            content: ''; position: absolute; left: 8px; top: 0; bottom: 0;
            width: 2px; background: linear-gradient(to bottom, #e8758f, #f4a261);
        }
        .tl-entry { position: relative; margin-bottom: 28px; }
        .tl-dot {
            position: absolute; left: -24px; top: 4px;
            width: 16px; height: 16px; border-radius: 50%;
            background: #e8758f; border: 3px solid #fdf6f0;
            display: flex; align-items: center; justify-content: center;
            font-size: 8px; color: #fff;
        }
        .tl-date {
            display: inline-block; font-size: 12px; color: #fff; background: #e8758f;
            padding: 2px 10px; border-radius: 10px; margin-bottom: 8px;
        }
        .tl-card {
            background: #fff; border-radius: 14px; padding: 16px; position: relative;
            box-shadow: 0 2px 12px rgba(232,117,143,0.08);
            border: 1px solid rgba(232,117,143,0.08);
        }
        .tl-title { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
        .tl-content { font-size: 14px; color: #5a4a4c; line-height: 1.6; }
        .tl-photos { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
        .tl-thumb {
            width: 72px; height: 72px; border-radius: 10px; object-fit: cover; cursor: pointer;
            transition: transform 0.3s;
        }
        .tl-thumb:hover { transform: scale(1.05); }

        /* Photo Gallery */
        .gallery {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px;
        }
        @media (min-width: 640px) { .gallery { grid-template-columns: repeat(3, 1fr); } }
        .gallery-item {
            position: relative; border-radius: 12px; overflow: hidden; cursor: pointer;
            aspect-ratio: 1; background: #f0e0d6;
        }
        .gallery-item img {
            width: 100%; height: 100%; object-fit: cover; transition: transform 0.4s;
        }
        .gallery-item:hover img { transform: scale(1.05); }
        .gallery-caption {
            position: absolute; bottom: 0; left: 0; right: 0;
            padding: 8px 10px; background: linear-gradient(transparent, rgba(0,0,0,0.6));
            color: #fff; font-size: 12px; opacity: 0; transition: opacity 0.3s;
        }
        .gallery-item:hover .gallery-caption { opacity: 1; }

        /* Lightbox */
        .lightbox {
            display: none; position: fixed; inset: 0; z-index: 2000;
            background: rgba(0,0,0,0.85); align-items: center; justify-content: center;
            flex-direction: column; padding: 20px;
        }
        .lightbox.open { display: flex; }
        .lb-close {
            position: absolute; top: 16px; right: 16px;
            background: none; border: none; color: #fff; font-size: 32px; cursor: pointer;
        }
        .lb-img { max-width: 90vw; max-height: 70vh; border-radius: 8px; object-fit: contain; }
        .lb-info { color: #fff; text-align: center; margin-top: 12px; font-size: 14px; }
        .lb-info .lb-cap { font-weight: 600; }
        .lb-info .lb-date { color: #ccc; font-size: 12px; margin-top: 4px; }
        .lb-nav {
            position: absolute; top: 50%; transform: translateY(-50%);
            background: rgba(255,255,255,0.2); border: none; color: #fff;
            font-size: 28px; width: 48px; height: 48px; border-radius: 50%;
            cursor: pointer; transition: background 0.3s;
        }
        .lb-nav:hover { background: rgba(255,255,255,0.4); }
        .lb-prev { left: 12px; }
        .lb-next { right: 12px; }

        /* Modals / Forms */
        .modal-overlay {
            display: none; position: fixed; inset: 0; z-index: 1500;
            background: rgba(0,0,0,0.4); align-items: center; justify-content: center; padding: 20px;
        }
        .modal-overlay.open { display: flex; }
        .modal {
            background: #fff; border-radius: 20px; padding: 28px 24px; width: 100%; max-width: 420px;
            max-height: 80vh; overflow-y: auto;
        }
        .modal h3 { font-size: 18px; color: #e8758f; margin-bottom: 16px; }
        .modal label { display: block; font-size: 13px; font-weight: 600; color: #8c7a7c; margin-bottom: 4px; margin-top: 12px; }
        .modal input, .modal textarea, .modal select {
            width: 100%; padding: 10px 14px; border: 1.5px solid #f0e0d6; border-radius: 10px;
            font-size: 16px; outline: none; transition: border-color 0.3s; font-family: inherit;
        }
        .modal input:focus, .modal textarea:focus { border-color: #e8758f; }
        .modal textarea { resize: vertical; min-height: 80px; }
        .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
        .modal-actions button {
            flex: 1; padding: 12px; border: none; border-radius: 12px;
            font-size: 14px; font-weight: 600; cursor: pointer; transition: opacity 0.3s;
        }
        .btn-primary { background: linear-gradient(135deg, #e8758f, #f4a261); color: #fff; }
        .btn-secondary { background: #f0e0d6; color: #3d2c2e; }

        /* Save Bar */
        .save-bar {
            display: none; position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
            background: #fff; border-top: 1px solid #f0e0d6; padding: 12px 20px;
            text-align: center; box-shadow: 0 -4px 20px rgba(0,0,0,0.06);
        }
        .save-bar.show { display: flex; gap: 10px; justify-content: center; }
        .save-bar button { padding: 12px 32px; border: none; border-radius: 12px; font-size: 14px; font-weight: 600; cursor: pointer; }
        .save-bar .save-status { font-size: 12px; color: #8c7a7c; align-self: center; }

        /* Settings Tab */
        .settings-form { padding: 0 4px; }
        .settings-group { background: #fff; border-radius: 14px; padding: 18px 16px; margin-bottom: 16px;
            box-shadow: 0 2px 12px rgba(232,117,143,0.06); border: 1px solid rgba(232,117,143,0.08); }
        .settings-group h4 { font-size: 15px; color: #e8758f; margin-bottom: 12px; }
        .settings-group label { display: block; font-size: 13px; font-weight: 600; color: #8c7a7c; margin-bottom: 4px; margin-top: 10px; }
        .settings-group label:first-of-type { margin-top: 0; }
        .settings-group input {
            width: 100%; padding: 10px 14px; border: 1.5px solid #f0e0d6; border-radius: 10px;
            font-size: 16px; outline: none; transition: border-color 0.3s; font-family: inherit;
        }
        .settings-group input:focus { border-color: #e8758f; }
        .settings-group .s-btn {
            margin-top: 14px; width: 100%; padding: 12px; border: none; border-radius: 12px;
            font-size: 14px; font-weight: 600; cursor: pointer;
            background: linear-gradient(135deg, #e8758f, #f4a261); color: #fff;
        }
        .token-hint { font-size: 11px; color: #8c7a7c; margin-top: 4px; line-height: 1.4; }
        .token-ok { color: #4caf50; font-weight: 600; font-size: 13px; margin-top: 8px; }

        /* Emoji Picker */
        .emoji-picker { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; max-height: 180px; overflow-y: auto; padding: 4px 0; }
        .emoji-opt {
            width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
            font-size: 22px; border-radius: 10px; cursor: pointer; border: 2px solid transparent;
            background: rgba(232,117,143,0.06); transition: all 0.2s;
        }
        .emoji-opt:hover { background: rgba(232,117,143,0.15); }
        .emoji-opt.selected { border-color: #e8758f; background: rgba(232,117,143,0.15); }

        /* Footer */
        .app-footer { text-align: center; padding: 32px 0 20px; color: #c4b0b2; font-size: 13px; }

        /* Init screen */
        .init-screen { text-align: center; padding: 60px 20px; color: #8c7a7c; }
        .init-screen p { margin-bottom: 16px; line-height: 1.6; }
    </style>
</head>
<body>
    <!-- Floating Hearts -->
    <div class="floating-hearts" id="floatingHearts">
        <div class="fh">&#x1F497;</div><div class="fh">&#x2764;&#xFE0F;</div>
        <div class="fh">&#x1F495;</div><div class="fh">&#x1F496;</div>
        <div class="fh">&#x1F497;</div><div class="fh">&#x2764;&#xFE0F;</div>
        <div class="fh">&#x1F495;</div>
    </div>

    <!-- Lock Screen -->
    <div id="lockScreen">
        <div class="lock-heart">&#x1F512;</div>
        <div class="lock-input-wrap">
            <input type="password" class="lock-input" id="pwdInput" placeholder="输入密码解锁" autocomplete="off">
            <button class="lock-btn" id="unlockBtn" onclick="doUnlock()">解锁</button>
            <div class="lock-error" id="lockError"></div>
        </div>
    </div>

    <!-- Edit Toggle (FAB) -->
    <button class="edit-toggle" id="editToggle" onclick="toggleEdit()">&#x270F;&#xFE0F;</button>

    <!-- Main App -->
    <div id="app">
        <header class="app-header">
            <div class="couple-names" id="coupleNames"></div>
        </header>

        <div class="tab-bar">
            <button class="tab-btn active" onclick="switchTab(0)">纪念日</button>
            <button class="tab-btn" onclick="switchTab(1)">点滴</button>
            <button class="tab-btn" onclick="switchTab(2)">相册</button>
        </div>

        <div class="tab-content" id="tabContent">
            <!-- Tab 0: Anniversaries -->
            <div class="tab-panel active" id="tabAnn">
                <div class="ann-scroll" id="annScroll"></div>
                <button class="add-btn" onclick="openModal('ann')">+ 添加纪念日</button>
            </div>

            <!-- Tab 1: Diary -->
            <div class="tab-panel" id="tabDiary">
                <div class="timeline" id="timeline"></div>
                <button class="add-btn" onclick="openModal('diary')">+ 添加记录</button>
            </div>

            <!-- Tab 2: Photos -->
            <div class="tab-panel" id="tabPhoto">
                <div class="gallery" id="gallery"></div>
                <button class="add-btn" onclick="openModal('photo')">+ 添加照片</button>
            </div>

        </div>

        <footer class="app-footer">Made with &#x2764;&#xFE0F;</footer>
    </div>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox">
        <button class="lb-close" onclick="closeLightbox()">&times;</button>
        <button class="lb-nav lb-prev" onclick="navLightbox(-1)">&#x276E;</button>
        <button class="lb-nav lb-next" onclick="navLightbox(1)">&#x276F;</button>
        <img class="lb-img" id="lbImg" src="" alt="">
        <div class="lb-info"><div class="lb-cap" id="lbCap"></div><div class="lb-date" id="lbDate"></div></div>
    </div>

    <!-- Save Bar -->
    <div class="save-bar" id="saveBar">
        <button class="btn-secondary" onclick="toggleEdit()">取消</button>
        <button class="btn-primary" id="saveBtn" onclick="saveData()">保存</button>
        <span class="save-status" id="saveStatus"></span>
    </div>

    <!-- Modal -->
    <div class="modal-overlay" id="modalOverlay" onclick="event.target===this&&closeModal()">
        <div class="modal" id="modalContent"></div>
    </div>

    <script>
    // ===== State =====
    let appData = null;
    let isEditing = false;
    let currentPwd = null;
    let currentLbIndex = 0;
    let dirty = false;

    // ===== Crypto =====
    async function deriveKey(password, salt) {
        const enc = new TextEncoder();
        const km = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
        return crypto.subtle.deriveKey(
            { name: 'PBKDF2', salt, iterations: 200000, hash: 'SHA-256' },
            km, { name: 'AES-GCM', length: 256 }, false, ['encrypt', 'decrypt']
        );
    }
    // Safe base64 encode/decode for large data
    function bufToB64(buf) {
        const arr = new Uint8Array(buf);
        let s = '';
        for (let i = 0; i < arr.length; i++) s += String.fromCharCode(arr[i]);
        return btoa(s);
    }
    function b64ToBuf(b64) {
        const s = atob(b64);
        const buf = new Uint8Array(s.length);
        for (let i = 0; i < s.length; i++) buf[i] = s.charCodeAt(i);
        return buf;
    }

    async function decryptData(password, b64) {
        const buf = b64ToBuf(b64);
        const salt = buf.slice(0, 16), iv = buf.slice(16, 28), ct = buf.slice(28);
        const key = await deriveKey(password, salt);
        const plain = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, ct);
        return JSON.parse(new TextDecoder().decode(plain));
    }
    async function encryptData(password, data) {
        const salt = crypto.getRandomValues(new Uint8Array(16));
        const iv = crypto.getRandomValues(new Uint8Array(12));
        const key = await deriveKey(password, salt);
        const ct = await crypto.subtle.encrypt(
            { name: 'AES-GCM', iv }, key, new TextEncoder().encode(JSON.stringify(data))
        );
        const combined = new Uint8Array(28 + ct.byteLength);
        combined.set(salt, 0); combined.set(iv, 16); combined.set(new Uint8Array(ct), 28);
        return bufToB64(combined);
    }

    // ===== Password storage (cookie only — localStorage reserved for data cache) =====
    function savePwd(p) {
        document.cookie = '_lp=' + encodeURIComponent(p) + ';max-age=31536000;path=/;Secure;SameSite=Lax';
    }
    function getPwd() {
        const m = document.cookie.match(/(?:^|;\s*)_lp=([^;]*)/);
        return m ? decodeURIComponent(m[1]) : '';
    }
    function clearPwd() {
        document.cookie = '_lp=;max-age=0;path=/;Secure';
    }

    // ===== Data cache (localStorage, with quota handling) =====
    function cacheData(jsonStr) {
        try {
            localStorage.setItem('_ld', jsonStr);
        } catch(e) {
            // Quota exceeded — clear old cache and retry
            try { localStorage.removeItem('_ld'); localStorage.removeItem('_lp'); } catch(e2) {}
            try { localStorage.setItem('_ld', jsonStr); } catch(e2) { /* give up */ }
        }
    }
    function getCachedData() {
        try {
            const c = localStorage.getItem('_ld');
            if (c) return JSON.parse(c);
        } catch(e) {}
        return null;
    }

    // ===== Unlock =====
    document.getElementById('pwdInput').addEventListener('keydown', e => { if (e.key === 'Enter') doUnlock(); });

    async function fetchData() {
        // Try localStorage cache first (instant, avoids deploy delay)
        const cached = getCachedData();
        if (cached) return cached;
        // Fetch from GitHub Pages
        try {
            const resp = await fetch('data/love_encrypted.json?v=' + Date.now());
            if (resp.ok) return await resp.json();
        } catch(e) {}
        return null;
    }

    async function tryUnlock(pwd, isAuto) {
        try {
            const json = await fetchData();
            if (!json) {
                // No data file — first time use
                appData = {
                    version: 1,
                    couple: { person1: 'CRY', person2: 'XYX' },
                    anniversaries: [], diary: [], photos: []
                };
                currentPwd = pwd; savePwd(pwd);
                showApp();
                renderAll();
                if (!isAuto) toggleEdit();
                return true;
            }
            appData = await decryptData(pwd, json.encrypted);
            cacheData(JSON.stringify(json));
            currentPwd = pwd; savePwd(pwd);
            showApp();
            renderAll();
            return true;
        } catch (e) {
            return false;
        }
    }

    async function doUnlock() {
        const pwd = document.getElementById('pwdInput').value;
        if (!pwd) return;
        const btn = document.getElementById('unlockBtn');
        const err = document.getElementById('lockError');
        btn.disabled = true; btn.textContent = '解锁中...'; err.textContent = '';

        const ok = await tryUnlock(pwd, false);
        if (!ok) err.textContent = '密码错误，请重试';
        btn.disabled = false; btn.textContent = '解锁';
    }

    // Check crypto support
    if (!window.crypto || !window.crypto.subtle) {
        document.body.innerHTML = '<div style="padding:40px;text-align:center;color:#e74c3c;font-size:16px;">当前浏览器不支持加密功能，请用 Safari 或 Chrome 打开</div>';
    }

    // Clean up stale localStorage password (now cookie-only)
    try { localStorage.removeItem('_lp'); } catch(e) {}

    // Auto-unlock on refresh, or show lock screen
    (async function autoUnlock() {
        try {
            const savedPwd = getPwd();
            if (savedPwd) {
                const ok = await tryUnlock(savedPwd, true);
                if (ok) return;
                clearPwd();
            }
        } catch(e) {}
        // No saved password or failed — show lock screen + hearts
        document.getElementById('lockScreen').classList.add('show');
        document.getElementById('floatingHearts').style.display = 'block';
    })();

    // ===== Tabs =====
    let currentTab = 0;
    function switchTab(idx) {
        currentTab = idx;
        document.querySelectorAll('.tab-btn').forEach((b, i) => b.classList.toggle('active', i === idx));
        document.querySelectorAll('.tab-panel').forEach((p, i) => p.classList.toggle('active', i === idx));
    }

    // Swipe detection on tab content
    (function() {
        const el = document.getElementById('tabContent');
        if (!el) return;
        let startX = 0, startY = 0;
        el.addEventListener('touchstart', e => { startX = e.touches[0].clientX; startY = e.touches[0].clientY; }, { passive: true });
        el.addEventListener('touchend', e => {
            const dx = e.changedTouches[0].clientX - startX;
            const dy = e.changedTouches[0].clientY - startY;
            if (Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy) * 1.5) {
                if (dx < 0 && currentTab < 2) switchTab(currentTab + 1);
                else if (dx > 0 && currentTab > 0) switchTab(currentTab - 1);
            }
        }, { passive: true });
    })();

    // ===== Render =====
    function renderAll() {
        renderHeader();
        renderAnniversaries();
        renderDiary();
        renderGallery();
        renderSettings();
    }

    function renderHeader() {
        const c = appData.couple;
        document.getElementById('coupleNames').textContent = c.person1 + ' \u2764\uFE0F ' + c.person2;
    }

    function daysBetween(a, b) { return Math.floor((b - a) / 86400000); }

    function renderAnniversaries() {
        const c = document.getElementById('annScroll');
        c.innerHTML = appData.anniversaries.map(a => {
            const now = new Date(), d = new Date(a.date);
            let days, label;
            if (a.type === 'countup') { days = daysBetween(d, now); label = '已经'; }
            else { days = daysBetween(now, d); label = days >= 0 ? '还有' : '已过'; days = Math.abs(days); }
            return '<div class="ann-card"><button class="item-del" onclick="delItem(\'anniversaries\',\'' + a.id + '\')">&times;</button>' +
                '<div class="ann-icon">' + a.icon + '</div>' +
                '<div class="ann-title">' + esc(a.title) + '</div>' +
                '<div class="ann-date">' + a.date + '</div>' +
                '<div class="ann-days">' + days + '</div>' +
                '<div class="ann-days-label">' + label + ' 天</div></div>';
        }).join('');
    }

    function renderDiary() {
        const c = document.getElementById('timeline');
        const sorted = [...appData.diary].sort((a, b) => new Date(b.date) - new Date(a.date));
        c.innerHTML = sorted.map(d => {
            let photoHtml = '';
            if (d.photos && d.photos.length) {
                const thumbs = d.photos.map(pid => {
                    const p = appData.photos.find(x => x.id === pid);
                    if (!p) return '';
                    const idx = appData.photos.indexOf(p);
                    return '<img class="tl-thumb" src="' + p.data + '" onclick="openLightbox(' + idx + ')" alt="">';
                }).join('');
                photoHtml = '<div class="tl-photos">' + thumbs + '</div>';
            }
            return '<div class="tl-entry"><div class="tl-dot">\u2764</div>' +
                '<div class="tl-date">' + d.date + '</div>' +
                '<div class="tl-card"><button class="item-del" onclick="delItem(\'diary\',\'' + d.id + '\')">&times;</button>' +
                '<div class="tl-title">' + esc(d.title) + '</div>' +
                '<div class="tl-content">' + esc(d.content) + '</div>' +
                photoHtml + '</div></div>';
        }).join('');
    }

    function renderGallery() {
        const c = document.getElementById('gallery');
        c.innerHTML = appData.photos.map((p, i) =>
            '<div class="gallery-item" onclick="openLightbox(' + i + ')">' +
            '<button class="item-del" onclick="event.stopPropagation();delItem(\'photos\',\'' + p.id + '\')">&times;</button>' +
            '<img src="' + p.data + '" alt="" loading="lazy">' +
            '<div class="gallery-caption">' + esc(p.caption || '') + '</div></div>'
        ).join('');
    }

    function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

    // ===== Lightbox =====
    function openLightbox(idx) {
        if (isEditing) return;
        currentLbIndex = idx;
        showLbPhoto();
        document.getElementById('lightbox').classList.add('open');
        document.body.style.overflow = 'hidden';
    }
    function closeLightbox() {
        document.getElementById('lightbox').classList.remove('open');
        document.body.style.overflow = '';
    }
    function navLightbox(dir) {
        const len = appData.photos.length;
        currentLbIndex = (currentLbIndex + dir + len) % len;
        showLbPhoto();
    }
    function showLbPhoto() {
        const p = appData.photos[currentLbIndex];
        if (!p) return;
        document.getElementById('lbImg').src = p.data;
        document.getElementById('lbCap').textContent = p.caption || '';
        document.getElementById('lbDate').textContent = p.date || '';
    }
    document.addEventListener('keydown', e => {
        if (!document.getElementById('lightbox').classList.contains('open')) return;
        if (e.key === 'Escape') closeLightbox();
        if (e.key === 'ArrowLeft') navLightbox(-1);
        if (e.key === 'ArrowRight') navLightbox(1);
    });

    // ===== Edit Mode =====
    function toggleEdit() {
        isEditing = !isEditing;
        document.body.classList.toggle('editing', isEditing);
        document.getElementById('editToggle').classList.toggle('active', isEditing);
        document.getElementById('saveBar').classList.toggle('show', isEditing);
    }

    function delItem(collection, id) {
        if (!confirm('确定删除？')) return;
        appData[collection] = appData[collection].filter(x => x.id !== id);
        // Also remove photo refs from diary
        if (collection === 'photos') {
            appData.diary.forEach(d => { d.photos = (d.photos || []).filter(pid => pid !== id); });
        }
        dirty = true;
        renderAll();
    }

    function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 6); }

    function pickEmoji(el) {
        document.querySelectorAll('.emoji-opt').forEach(e => e.classList.remove('selected'));
        el.classList.add('selected');
        document.getElementById('mAnnIcon').value = el.dataset.emoji;
    }

    // ===== Modals =====
    function openModal(type) {
        const m = document.getElementById('modalContent');
        const o = document.getElementById('modalOverlay');
        if (type === 'ann') {
            const emojis = [
                '❤️','💕','💗','💖','💘','💝','💞','🥰','😘','🫶',
                '💍','💒','👫','👩‍❤️‍👨','💑','🤝','🫂','👶','🤰','👨‍👩‍👧',
                '🌹','🌸','🌺','💐','🌷','🪻','🌻','🍀','🌙','⭐',
                '🎂','🎉','🎊','🥂','🍰','🎁','🎈','🪄','✨','🎆',
                '✈️','🏖️','🗼','🎡','🏔️','🚗','🛳️','🏠','🌅','🌈',
                '🎓','📅','💌','📸','🎬','🎵','🎮','📖','🍽️','☕',
                '🐾','🐶','🐱','🐰','🦋','🕊️','🎄','🧸','🪴','🫧'
            ];
            const emojiGrid = emojis.map(e =>
                '<span class="emoji-opt" onclick="pickEmoji(this)" data-emoji="' + e + '">' + e + '</span>'
            ).join('');
            m.innerHTML = '<h3>添加纪念日</h3>' +
                '<label>标题</label><input id="mAnnTitle" placeholder="如：在一起">' +
                '<label>日期</label><input id="mAnnDate" type="date">' +
                '<label>选择图标</label><div class="emoji-picker" id="emojiPicker">' + emojiGrid + '</div>' +
                '<input type="hidden" id="mAnnIcon" value="❤️">' +
                '<label>类型</label><select id="mAnnType"><option value="countup">已过天数</option><option value="countdown">倒计时</option></select>' +
                '<div class="modal-actions"><button class="btn-secondary" onclick="closeModal()">取消</button>' +
                '<button class="btn-primary" onclick="addAnn()">添加</button></div>';
            // Default select first
            m.querySelector('.emoji-opt').classList.add('selected');
        } else if (type === 'diary') {
            m.innerHTML = '<h3>添加恋爱点滴</h3>' +
                '<label>日期</label><input id="mDiaryDate" type="date" value="' + todayStr() + '">' +
                '<label>标题</label><input id="mDiaryTitle" placeholder="今天做了什么...">' +
                '<label>内容</label><textarea id="mDiaryContent" placeholder="详细描述..."></textarea>' +
                '<div class="modal-actions"><button class="btn-secondary" onclick="closeModal()">取消</button>' +
                '<button class="btn-primary" onclick="addDiary()">添加</button></div>';
        } else if (type === 'photo') {
            m.innerHTML = '<h3>添加照片</h3>' +
                '<label>选择图片</label><input id="mPhotoFile" type="file" accept="image/*">' +
                '<label>说明</label><input id="mPhotoCap" placeholder="这张照片的故事...">' +
                '<label>日期</label><input id="mPhotoDate" type="date" value="' + todayStr() + '">' +
                '<div id="mPhotoPreview" style="margin-top:12px;text-align:center;"></div>' +
                '<div class="modal-actions"><button class="btn-secondary" onclick="closeModal()">取消</button>' +
                '<button class="btn-primary" onclick="addPhoto()">添加</button></div>';
            setTimeout(() => {
                document.getElementById('mPhotoFile').addEventListener('change', previewPhoto);
            }, 50);
        }
        o.classList.add('open');
    }

    function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }
    function todayStr() { return new Date().toISOString().slice(0, 10); }

    function addAnn() {
        const title = document.getElementById('mAnnTitle').value.trim();
        const date = document.getElementById('mAnnDate').value;
        const icon = document.getElementById('mAnnIcon').value || '\u2764\uFE0F';
        const type = document.getElementById('mAnnType').value;
        if (!title || !date) return alert('请填写标题和日期');
        appData.anniversaries.push({ id: genId(), title, date, icon, type });
        dirty = true; closeModal(); renderAll();
    }

    function addDiary() {
        const date = document.getElementById('mDiaryDate').value;
        const title = document.getElementById('mDiaryTitle').value.trim();
        const content = document.getElementById('mDiaryContent').value.trim();
        if (!title || !date) return alert('请填写标题和日期');
        appData.diary.push({ id: genId(), date, title, content: content || '', mood: 'happy', photos: [] });
        dirty = true; closeModal(); renderAll();
    }

    // ===== Photo Compression =====
    let pendingPhotoData = null;
    function previewPhoto(e) {
        const file = e.target.files[0];
        if (!file) return;
        compressImage(file, (dataUrl) => {
            pendingPhotoData = dataUrl;
            document.getElementById('mPhotoPreview').innerHTML =
                '<img src="' + dataUrl + '" style="max-width:200px;max-height:200px;border-radius:10px;">';
        });
    }
    function compressImage(file, cb) {
        const reader = new FileReader();
        reader.onload = function(e) {
            const img = new Image();
            img.onload = function() {
                const canvas = document.createElement('canvas');
                let w = img.width, h = img.height;
                const MAX = 1200;
                if (w > MAX) { h = Math.round(h * MAX / w); w = MAX; }
                if (h > MAX) { w = Math.round(w * MAX / h); h = MAX; }
                canvas.width = w; canvas.height = h;
                canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                cb(canvas.toDataURL('image/jpeg', 0.7));
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }

    function addPhoto() {
        if (!pendingPhotoData) return alert('请先选择图片');
        const caption = document.getElementById('mPhotoCap').value.trim();
        const date = document.getElementById('mPhotoDate').value;
        appData.photos.push({ id: genId(), data: pendingPhotoData, caption, date });
        pendingPhotoData = null;
        dirty = true; closeModal(); renderAll();
    }

    function saveCouple() {
        appData.couple.person1 = document.getElementById('mP1').value.trim() || 'CRY';
        appData.couple.person2 = document.getElementById('mP2').value.trim() || 'XYX';
        dirty = true; closeModal(); renderAll();
    }

    async function saveSettings() {
        const repo = document.getElementById('sRepo').value.trim();
        const token = document.getElementById('sToken').value.trim();
        if (!repo || !token) return alert('请填写仓库和 Token');
        appData._ghRepo = repo;
        appData._ghToken = token;
        await pushToGitHub();
        renderSettings();
    }

    async function saveNames() {
        appData.couple.person1 = document.getElementById('sP1').value.trim() || 'CRY';
        appData.couple.person2 = document.getElementById('sP2').value.trim() || 'XYX';
        dirty = true;
        await pushToGitHub();
        renderAll();
    }

    function renderSettings() {
        const curToken = (appData && appData._ghToken) || '';
        const curRepo = (appData && appData._ghRepo) || GH_REPO;
        const c = appData.couple;
        document.getElementById('settingsForm').innerHTML =
            '<div class="settings-group"><h4>名字设置</h4>' +
            '<label>你的名字</label><input id="sP1" value="' + esc(c.person1) + '">' +
            '<label>TA的名字</label><input id="sP2" value="' + esc(c.person2) + '">' +
            '<button class="s-btn" onclick="saveNames()">保存名字</button></div>' +
            '<div class="settings-group"><h4>GitHub 设置</h4>' +
            '<label>仓库（owner/repo）</label><input id="sRepo" value="' + esc(curRepo) + '" placeholder="username/repo">' +
            '<div class="token-hint">如：chenruoyi0202-ship-it/cry</div>' +
            '<label>Personal Access Token</label><input id="sToken" type="password" value="' + esc(curToken) + '" placeholder="ghp_xxxxxxxxxxxx">' +
            '<div class="token-hint">在 GitHub Settings &gt; Developer settings &gt; Personal access tokens &gt; Fine-grained tokens 创建，需要 Contents 读写权限。</div>' +
            (curToken ? '<div class="token-ok">Token 已配置</div>' : '') +
            '<button class="s-btn" onclick="saveSettings()">保存设置</button></div>';
    }

    // ===== GitHub Config =====
    const GH_PATH = 'data/love_encrypted.json';

    function detectRepo() {
        const host = location.hostname;
        if (host.endsWith('.github.io')) {
            const owner = host.replace('.github.io', '');
            const repo = location.pathname.split('/')[1] || '';
            if (repo) return owner + '/' + repo;
        }
        return '';
    }
    const GH_REPO = detectRepo();

    function getToken() { return (appData && appData._ghToken) || ''; }
    function getRepo() { return (appData && appData._ghRepo) || GH_REPO; }

    function showApp() {
        document.getElementById('lockScreen').classList.remove('show');
        document.getElementById('lockScreen').classList.add('hidden');
        document.getElementById('floatingHearts').style.display = 'none';
        document.getElementById('editToggle').classList.add('show');
        document.getElementById('app').classList.add('show');
    }

    // ===== Push to GitHub =====
    async function pushToGitHub() {
        const pwd = currentPwd || getPwd();
        if (!pwd) return alert('密码已过期，请刷新重新登录');

        const token = getToken();
        const repo = getRepo();

        if (!token || !repo) {
            switchTab(3);
            alert('请先在设置中配置 GitHub Token（只需配置一次，之后所有人输入密码即可编辑保存）');
            return;
        }

        try {
            const encrypted = await encryptData(pwd, appData);
            const output = JSON.stringify({ encrypted, updatedAt: new Date().toISOString() });
            const content = bufToB64(new TextEncoder().encode(output));

            // Get current file SHA (needed for update)
            const getResp = await fetch('https://api.github.com/repos/' + repo + '/contents/' + GH_PATH, {
                headers: { 'Authorization': 'Bearer ' + token, 'Accept': 'application/vnd.github.v3+json' }
            });
            let sha = '';
            if (getResp.ok) {
                const fileInfo = await getResp.json();
                sha = fileInfo.sha;
            }

            const body = { message: 'Update love data', content };
            if (sha) body.sha = sha;

            const putResp = await fetch('https://api.github.com/repos/' + repo + '/contents/' + GH_PATH, {
                method: 'PUT',
                headers: {
                    'Authorization': 'Bearer ' + token,
                    'Accept': 'application/vnd.github.v3+json',
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(body)
            });

            if (!putResp.ok) {
                const err = await putResp.json();
                throw new Error(err.message || 'GitHub API error');
            }

            // Cache locally so refresh doesn't need to wait for GitHub Pages deploy
            cacheData(output);
            dirty = false;
            return true;
        } catch (e) {
            alert('保存失败: ' + e.message);
            return false;
        }
    }

    // ===== Save (called from save bar) =====
    async function saveData() {
        const btn = document.getElementById('saveBtn');
        const status = document.getElementById('saveStatus');
        btn.disabled = true; btn.textContent = '保存中...'; status.textContent = '';

        const ok = await pushToGitHub();
        if (ok) {
            status.textContent = '已保存';
            btn.textContent = '保存';
            btn.disabled = false;
            setTimeout(() => { toggleEdit(); status.textContent = ''; }, 1500);
        } else {
            btn.textContent = '保存';
            btn.disabled = false;
        }
    }

    </script>
