<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>止盈计算推演 - 通用港股/美股工具</title>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
            background: #0a0a0a;
            color: #F8FAFC;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Finance background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            z-index: 0;
            background:
                /* grid lines */
                linear-gradient(rgba(202,138,4,0.06) 1px, transparent 1px),
                linear-gradient(90deg, rgba(202,138,4,0.06) 1px, transparent 1px),
                /* diagonal trend lines */
                repeating-linear-gradient(
                    -30deg,
                    transparent,
                    transparent 60px,
                    rgba(202,138,4,0.04) 60px,
                    rgba(202,138,4,0.04) 61px
                ),
                /* color zones */
                radial-gradient(ellipse at 15% 85%, rgba(30,58,138,0.3) 0%, transparent 50%),
                radial-gradient(ellipse at 85% 10%, rgba(202,138,4,0.2) 0%, transparent 45%),
                radial-gradient(ellipse at 50% 50%, rgba(30,58,138,0.1) 0%, transparent 60%),
                #0a0a0a;
            background-size: 40px 40px, 40px 40px, auto, auto, auto, auto, auto;
        }

        /* Floating glow orbs */
        .bg-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(60px);
            z-index: 0;
            pointer-events: none;
        }
        .bg-orb-1 {
            width: 350px; height: 350px;
            background: rgba(202,138,4,0.15);
            top: -80px; right: -60px;
            animation: float1 20s ease-in-out infinite;
        }
        .bg-orb-2 {
            width: 300px; height: 300px;
            background: rgba(30,58,138,0.2);
            bottom: 5%; left: -80px;
            animation: float2 25s ease-in-out infinite;
        }
        .bg-orb-3 {
            width: 250px; height: 250px;
            background: rgba(202,138,4,0.1);
            top: 45%; right: -50px;
            animation: float3 18s ease-in-out infinite;
        }

        @keyframes float1 {
            0%, 100% { transform: translate(0, 0); }
            33% { transform: translate(-30px, 40px); }
            66% { transform: translate(20px, -20px); }
        }
        @keyframes float2 {
            0%, 100% { transform: translate(0, 0); }
            33% { transform: translate(40px, -30px); }
            66% { transform: translate(-20px, 20px); }
        }
        @keyframes float3 {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(-25px, 35px); }
        }

        /* Respect reduced motion */
        @media (prefers-reduced-motion: reduce) {
            .bg-orb { animation: none !important; }
        }

        .card {
            width: 100%;
            max-width: 460px;
            position: relative;
            z-index: 1;
            background: linear-gradient(180deg, rgba(26,26,26,0.95) 0%, rgba(10,10,10,0.98) 100%);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(202,138,4,0.15);
            border-radius: 20px;
            padding: 28px 22px 24px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.5);
        }

        /* Header */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(255,160,0,0.15);
            color: #CA8A04;
            font-size: 13px;
            font-weight: 600;
            padding: 5px 16px;
            border-radius: 20px;
            margin: 0 auto 14px;
        }
        .badge::before {
            content: '';
            width: 8px; height: 8px;
            background: #CA8A04;
            border-radius: 50%;
        }

        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { font-size: 24px; font-weight: 700; color: #fff; margin-bottom: 6px; letter-spacing: 2px; }
        .header .sub { font-size: 13px; color: #64748B; }

        /* Real-time price */
        .realtime-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(79,195,247,0.06);
            border: 1px solid rgba(79,195,247,0.15);
            border-radius: 12px;
            padding: 12px 16px;
            margin-bottom: 20px;
            cursor: pointer;
            transition: border-color 0.3s;
        }
        .realtime-bar:hover { border-color: rgba(79,195,247,0.35); }
        .realtime-bar .rt-left { display: flex; align-items: center; gap: 10px; }
        .rt-dot {
            width: 8px; height: 8px;
            background: #4fc3f7;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        .rt-label { font-size: 12px; color: #64748B; }
        .rt-price { font-size: 22px; font-weight: 700; color: #4fc3f7; }
        .rt-change { font-size: 13px; font-weight: 600; margin-left: 8px; }
        .rt-change.up { color: #4caf50; }
        .rt-change.down { color: #f44336; }
        .rt-time { font-size: 11px; color: #475569; }

        /* Section titles */
        .section-title {
            font-size: 14px;
            font-weight: 600;
            color: #94A3B8;
            margin-bottom: 12px;
            padding-left: 10px;
            border-left: 3px solid #CA8A04;
        }

        /* Input Groups */
        .input-group {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 14px;
            padding: 16px;
            margin-bottom: 16px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 10px;
        }
        .form-row:last-child { margin-bottom: 0; }
        .form-row.three-col { grid-template-columns: 1fr 1fr 1fr; }

        .field { display: flex; flex-direction: column; gap: 4px; }
        .field label {
            font-size: 12px;
            color: #64748B;
            font-weight: 500;
        }
        .field input {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 12px 14px;
            min-height: 44px;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            outline: none;
            transition: border-color 0.2s;
            width: 100%;
        }
        .field input:focus { border-color: #CA8A04; }
        .field input::placeholder { color: #334155; font-weight: 400; }

        /* Reduction records - card layout */
        .records-list { margin-top: 8px; }

        .record-item {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            padding: 14px 16px;
            margin-bottom: 10px;
            transition: border-color 0.2s;
        }
        .record-item:hover { border-color: rgba(202,138,4,0.3); }

        .record-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
        }
        .record-top-left { display: flex; align-items: center; gap: 10px; }

        .record-tag {
            display: inline-block;
            font-size: 11px;
            padding: 3px 10px;
            border-radius: 6px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        .tag-done { background: rgba(76,175,80,0.15); color: #4caf50; }
        .tag-plan { background: rgba(202,138,4,0.15); color: #FBBF24; }

        .rec-price { font-size: 18px; font-weight: 700; color: #F8FAFC; }

        .rec-pct { display: flex; gap: 6px; }
        .rec-pct span {
            font-size: 11px; font-weight: 600;
            padding: 2px 8px; border-radius: 6px;
        }
        .rec-pct .pos { color: #4caf50; background: rgba(76,175,80,0.12); }
        .rec-pct .neg { color: #f44336; background: rgba(244,67,54,0.12); }

        .record-bottom {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .rec-details { display: flex; gap: 16px; align-items: center; }
        .rec-shares { color: #94A3B8; font-size: 13px; font-weight: 500; }
        .rec-profit { font-size: 15px; font-weight: 700; }
        .rec-profit.pos { color: #4caf50; }
        .rec-profit.neg { color: #f44336; }

        .rec-actions { display: flex; gap: 8px; }
        .rec-btn {
            border: none;
            min-width: 36px; min-height: 36px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .rec-del { color: #f44336; background: rgba(244,67,54,0.12); }
        .rec-del:hover { background: rgba(244,67,54,0.25); }
        .rec-edit { color: #60A5FA; background: rgba(30,58,138,0.2); }
        .rec-edit:hover { background: rgba(30,58,138,0.4); }

        /* Add buttons */
        .add-row {
            display: flex;
            gap: 10px;
            margin-top: 8px;
        }
        .btn {
            flex: 1;
            padding: 14px 12px;
            min-height: 44px;
            border: 1px dashed rgba(255,255,255,0.15);
            background: transparent;
            color: #94A3B8;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn:hover { background: rgba(255,255,255,0.06); color: #fff; }
        .btn-primary {
            border: none;
            background: linear-gradient(135deg, #1E3A8A, #1E40AF);
            color: #fff;
            font-weight: 600;
        }
        .btn-primary:hover { opacity: 0.9; }

        /* Add form (hidden by default) */
        .add-form {
            display: none;
            margin-top: 10px;
            padding: 14px;
            background: rgba(30,58,138,0.08);
            border: 1px solid rgba(30,58,138,0.3);
            border-radius: 12px;
        }
        .add-form.active { display: block; }
        .add-form .form-row { margin-bottom: 10px; }
        .add-form-actions { display: flex; gap: 10px; margin-top: 12px; }
        .add-form-actions .btn { padding: 12px; min-height: 44px; }

        /* Results */
        .results {
            background: linear-gradient(135deg, rgba(76,175,80,0.06), rgba(76,175,80,0.02));
            border: 1px solid rgba(76,175,80,0.15);
            border-radius: 14px;
            padding: 20px;
            margin-top: 20px;
        }
        .results.loss {
            background: linear-gradient(135deg, rgba(244,67,54,0.06), rgba(244,67,54,0.02));
            border-color: rgba(244,67,54,0.15);
        }

        .result-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
            font-size: 13px;
            color: #64748B;
            border-bottom: 1px solid rgba(255,255,255,0.04);
        }
        .result-row:last-child { border-bottom: none; }
        .result-row .rv { color: #E2E8F0; font-weight: 600; }

        .result-big {
            text-align: center;
            padding: 16px 0 8px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            margin-bottom: 12px;
        }
        .result-big .rb-label { font-size: 12px; color: #64748B; margin-bottom: 4px; }
        .result-big .rb-value { font-size: 38px; font-weight: 700; }
        .result-big .rb-value.pos { color: #4caf50; }
        .result-big .rb-value.neg { color: #f44336; }
        .result-big .rb-value span { font-size: 20px; }
        .result-big .rb-rate { font-size: 18px; font-weight: 600; margin-top: 4px; }
        .result-big .rb-rate.pos { color: #4caf50; }
        .result-big .rb-rate.neg { color: #f44336; }

        /* Position Bar */
        .pos-bar-container { margin: 16px 0 8px; }
        .pos-bar-label {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: #475569;
            margin-bottom: 6px;
        }
        .pos-bar {
            height: 8px;
            background: rgba(255,255,255,0.06);
            border-radius: 8px;
            overflow: hidden;
            display: flex;
        }
        .pos-bar .bar-sold {
            background: linear-gradient(90deg, #4caf50, #66bb6a);
            height: 100%;
            transition: width 0.5s;
        }
        .pos-bar .bar-plan {
            background: linear-gradient(90deg, #ffb74d, #ffa726);
            height: 100%;
            transition: width 0.5s;
        }
        .pos-bar .bar-hold {
            background: linear-gradient(90deg, #4fc3f7, #29b6f6);
            height: 100%;
            transition: width 0.5s;
        }
        .pos-legend {
            display: flex;
            gap: 14px;
            margin-top: 6px;
            font-size: 11px;
            color: #64748B;
        }
        .pos-legend i {
            display: inline-block;
            width: 8px; height: 8px;
            border-radius: 2px;
            margin-right: 4px;
            vertical-align: middle;
        }
        .leg-sold { background: #4caf50; }
        .leg-plan { background: #ffb74d; }
        .leg-hold { background: #4fc3f7; }

        /* Batches visual */
        .batches-visual {
            margin-top: 16px;
        }
        .bv-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.04);
        }
        .bv-item:last-child { border-bottom: none; }
        .bv-num {
            width: 24px; height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 700;
            flex-shrink: 0;
        }
        .bv-done .bv-num { background: rgba(76,175,80,0.2); color: #4caf50; }
        .bv-plan .bv-num { background: rgba(255,183,77,0.2); color: #ffb74d; }
        .bv-info { flex: 1; font-size: 13px; color: #94A3B8; }
        .bv-info strong { color: #E2E8F0; }
        .bv-profit { font-size: 14px; font-weight: 700; }
        .bv-profit.pos { color: #4caf50; }
        .bv-profit.neg { color: #f44336; }

        /* Disclaimer */
        .disclaimer {
            text-align: center;
            font-size: 11px;
            color: #334155;
            line-height: 1.7;
            padding-top: 16px;
            margin-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.04);
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 20px;
            color: #475569;
            font-size: 13px;
        }

        /* Plan management */
        .plan-bar {
            display: flex;
            gap: 6px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .plan-bar select {
            flex: 1;
            min-width: 0;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            padding: 8px 10px;
            color: #fff;
            font-size: 13px;
            outline: none;
        }
        .plan-bar select option { background: #1E293B; }
        .plan-btn {
            padding: 10px 16px;
            min-height: 44px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.04);
            color: #94A3B8;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
        }
        .plan-btn:hover { background: rgba(255,255,255,0.08); color: #fff; }
        .plan-btn-save {
            background: linear-gradient(135deg, #1E3A8A, #1E40AF);
            border: none;
            color: #CA8A04;
            font-weight: 600;
        }
        .plan-btn-save:hover { opacity: 0.9; }
        .plan-btn-del {
            border-color: rgba(244,67,54,0.3);
            color: #f44336;
        }
        .plan-btn-del:hover { background: rgba(244,67,54,0.15); }

        /* Charts */
        .charts-section {
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid rgba(255,255,255,0.06);
        }
        .charts-title {
            font-size: 13px;
            color: #64748B;
            margin-bottom: 12px;
            font-weight: 600;
        }
        .charts-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
        }
        @media (min-width: 768px) {
            .charts-grid { grid-template-columns: 1fr 1fr; }
        }
        .chart-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 12px;
            padding: 14px;
        }
        .chart-card-title {
            font-size: 12px;
            color: #94A3B8;
            margin-bottom: 10px;
            font-weight: 500;
        }
        .chart-card canvas {
            width: 100%;
            height: 180px;
            display: block;
        }

        /* Save image button */
        .save-img-btn {
            display: none;
            width: 100%;
            min-height: 44px;
            padding: 12px;
            margin-top: 12px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #1E3A8A, #1E40AF);
            color: #FBBF24;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .save-img-btn:hover { opacity: 0.9; }
        .save-img-btn.visible { display: block; }

        @media (max-width: 400px) {
            .form-row.three-col { grid-template-columns: 1fr 1fr; }
        }

        /* PC / Tablet */
        @media (min-width: 768px) {
            .card {
                max-width: 680px;
                padding: 36px 32px 28px;
            }
            .header h1 { font-size: 28px; }
            .section-title { font-size: 16px; }

            /* Results: 2-column grid */
            .result-row {
                font-size: 14px;
                padding: 8px 0;
            }
            .result-big .rb-value { font-size: 44px; }
            .result-big .rb-rate { font-size: 20px; }

            /* Records side by side */
            .records-list {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 10px;
            }
            .record-item { margin-bottom: 0; }

            /* Wider add form */
            .add-form .form-row.three-col { grid-template-columns: 1fr 1fr 1fr; }

            /* Position bar */
            .pos-legend { font-size: 13px; }
        }

        /* Large desktop */
        @media (min-width: 1024px) {
            .card {
                max-width: 800px;
                padding: 40px 40px 32px;
            }
        }
    </style>
</head>
<body>
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>
    <div class="bg-orb bg-orb-3"></div>
    <div class="card">
        <!-- Header -->
        <div class="header">
            <div class="badge" id="stockBadge">止盈推演工具</div>
            <h1>止盈计算推演</h1>
            <p class="sub">输入股票代码，持仓与减仓计划，计算最终盈利</p>
        </div>

        <!-- Plan Management -->
        <div class="section-title">方案管理</div>
        <div class="plan-bar">
            <select id="planSelect" onchange="loadPlan()">
                <option value="">-- 选择已保存方案 --</option>
            </select>
            <button class="plan-btn plan-btn-save" onclick="savePlan()">保存</button>
            <button class="plan-btn plan-btn-del" onclick="deletePlan()">删除</button>
        </div>

        <!-- Stock Info + Price -->
        <div class="section-title">股票 & 当前价格</div>
        <div class="input-group">
            <div class="form-row">
                <div class="field">
                    <label>股票名称/代码</label>
                    <input type="text" id="stockInput" placeholder="如: 02680" oninput="updateBadge()">
                </div>
                <div class="field">
                    <label>市场</label>
                    <select id="marketSelect" onchange="calculate()" style="background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:12px 10px;min-height:44px;color:#fff;font-size:16px;font-weight:600;outline:none;">
                        <option value="HK" style="background:#1E293B;">港股 (HKD)</option>
                        <option value="US" style="background:#1E293B;">美股 (USD)</option>
                    </select>
                </div>
            </div>
            <div class="form-row">
                <div class="field">
                    <label>当前股价</label>
                    <input type="number" step="0.001" id="manualPrice" placeholder="输入当前价" oninput="applyManualPrice()">
                </div>
                <div class="field" style="justify-content:flex-end;">
                    <button onclick="fetchPrice()" style="padding:12px 16px;min-height:44px;background:linear-gradient(135deg,#4fc3f7,#29b6f6);border:none;border-radius:10px;color:#fff;font-weight:600;font-size:14px;cursor:pointer;width:100%;" title="尝试自动获取">刷新股价</button>
                </div>
            </div>
            <div id="rtStatus" style="font-size:11px;color:#475569;margin-top:4px;display:none;"></div>
            <div style="display:flex;align-items:center;gap:6px;margin-top:6px;">
                <div id="fxStatus" style="font-size:11px;color:#475569;flex:1;">汇率加载中...</div>
                <button onclick="fetchFxRates()" style="padding:4px 8px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:6px;color:#64748B;font-size:10px;cursor:pointer;">刷新汇率</button>
            </div>
        </div>

        <!-- 1. Position Input -->
        <div class="section-title">持仓信息</div>
        <div class="input-group">
            <div class="form-row">
                <div class="field">
                    <label>买入均价</label>
                    <input type="number" step="0.001" id="costPrice" placeholder="例: 11.50" oninput="calculate()">
                </div>
                <div class="field">
                    <label>总持仓股数</label>
                    <input type="number" step="1" id="totalShares" placeholder="例: 56000" oninput="calculate()">
                </div>
            </div>
        </div>

        <!-- 2. Reduction Records -->
        <div class="section-title">减仓记录 & 计划</div>
        <div class="input-group">
            <div class="records-list" id="recordsList">
                <div class="empty-state" id="emptyState">暂无减仓记录，点击下方按钮添加</div>
            </div>

            <!-- Add form -->
            <div class="add-form" id="addForm">
                <div class="form-row three-col">
                    <div class="field">
                        <label>卖出价格</label>
                        <input type="number" step="0.001" id="addPrice" placeholder="价格">
                    </div>
                    <div class="field">
                        <label>卖出股数</label>
                        <input type="number" step="1" id="addShares" placeholder="股数">
                    </div>
                    <div class="field">
                        <label>类型</label>
                        <select id="addType" style="background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:10px 8px;color:#fff;font-size:14px;outline:none;">
                            <option value="done" style="background:#1E293B;">已卖出</option>
                            <option value="plan" style="background:#1E293B;">计划卖出</option>
                        </select>
                    </div>
                </div>
                <div class="add-form-actions">
                    <button class="btn" onclick="hideAddForm()">取消</button>
                    <button class="btn btn-primary" onclick="addRecord()">确认添加</button>
                </div>
            </div>

            <div class="add-row">
                <button class="btn" onclick="showAddForm()">+ 添加减仓记录</button>
                <button class="btn" onclick="useCurrentPrice()">用实时价添加</button>
            </div>
        </div>

        <!-- 3. Results -->
        <div class="section-title">推演结果</div>
        <div id="resultsArea">
            <div class="input-group">
                <div class="empty-state">请先输入持仓信息和减仓记录</div>
            </div>
        </div>
        <button class="save-img-btn" id="saveImgBtn" onclick="saveAsImage()">保存推演结果为图片</button>

        <!-- Disclaimer -->
        <div class="disclaimer">
            本工具仅为个人计算参考，不构成投资建议<br>
            市场有风险 · 严守纪律，不贪不惧
        </div>
    </div>

    <script>
        // --- State ---
        let records = [];
        let currentRtPrice = null;

        // --- Currency (real-time via Yahoo Finance) ---
        let FX_RATES = { HK: 0.89, US: 6.90 }; // fallback defaults
        let fxLoaded = false;

        async function fetchFxRates() {
            const pairs = [
                { key: 'HK', symbol: 'HKDCNY=X' },
                { key: 'US', symbol: 'USDCNY=X' }
            ];
            const proxies = [
                url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
                url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
                url => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`,
            ];
            for (const pair of pairs) {
                const yahooUrl = `https://query1.finance.yahoo.com/v8/finance/chart/${pair.symbol}?interval=1d&range=1d`;
                for (const proxy of proxies) {
                    try {
                        const resp = await fetch(proxy(yahooUrl), { signal: AbortSignal.timeout(5000) });
                        if (!resp.ok) continue;
                        const data = await resp.json();
                        const price = data.chart.result[0].meta.regularMarketPrice;
                        if (price) { FX_RATES[pair.key] = price; fxLoaded = true; break; }
                    } catch { continue; }
                }
            }
            updateFxDisplay();
            calculate();
        }

        function updateFxDisplay() {
            const el = document.getElementById('fxStatus');
            if (!el) return;
            if (fxLoaded) {
                el.textContent = `汇率: 1 HKD = ${FX_RATES.HK.toFixed(4)} CNY | 1 USD = ${FX_RATES.US.toFixed(4)} CNY · ${new Date().toLocaleTimeString('zh-CN')}`;
                el.style.color = '#4caf50';
            } else {
                el.textContent = `汇率获取失败，使用默认值 (HKD ${FX_RATES.HK} / USD ${FX_RATES.US})`;
                el.style.color = '#ffb74d';
            }
        }

        function getCurrency() {
            const m = document.getElementById('marketSelect').value;
            return m === 'US' ? 'USD' : 'HKD';
        }
        function toCNY(amount) {
            const m = document.getElementById('marketSelect').value;
            return amount * FX_RATES[m];
        }
        function fmtCNY(amount) {
            const cny = toCNY(amount);
            return '≈ ¥' + formatMoney(cny);
        }

        // --- Price ---
        let currentSymbol = '';

        function updateBadge() {
            const name = document.getElementById('stockInput').value.trim();
            document.getElementById('stockBadge').textContent = name || '止盈推演工具';
        }

        function applyManualPrice() {
            const val = parseFloat(document.getElementById('manualPrice').value);
            if (isNaN(val) || val <= 0) { currentRtPrice = null; calculate(); return; }
            currentRtPrice = val;
            calculate();
        }

        // Auto-fetch: bonus feature, tries CORS proxies to Yahoo Finance
        async function fetchPrice() {
            const input = document.getElementById('stockInput').value.trim();
            // Extract stock code: try to find something like "2680" or "AAPL" or "2680.HK"
            let symbol = '';
            const codeMatch = input.match(/\b(\d{1,5})\b/);
            const tickerMatch = input.match(/\b([A-Za-z]{1,5}(?:\.\w+)?)\b/);
            const fullMatch = input.match(/\b(\d{1,5}\.[A-Z]{1,3})\b/i);

            if (fullMatch) {
                symbol = fullMatch[1].toUpperCase();
            } else if (codeMatch) {
                symbol = codeMatch[1].replace(/^0+/, '') + '.HK';
            } else if (tickerMatch) {
                symbol = tickerMatch[1].toUpperCase();
            }

            if (!symbol) {
                document.getElementById('rtStatus').style.display = 'block';
                document.getElementById('rtStatus').textContent = '无法识别股票代码，请手动输入价格';
                return;
            }

            currentSymbol = symbol;
            const statusEl = document.getElementById('rtStatus');
            statusEl.style.display = 'block';
            statusEl.textContent = `正在获取 ${symbol} 报价...`;
            statusEl.style.color = '#ffb74d';

            const yahooV8 = `https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(symbol)}?interval=1d&range=2d`;
            const yahooV6 = `https://query2.finance.yahoo.com/v6/finance/quote?symbols=${encodeURIComponent(symbol)}`;
            const parseV8 = (data) => {
                const meta = data.chart.result[0].meta;
                return { price: meta.regularMarketPrice, prevClose: meta.chartPreviousClose || meta.previousClose };
            };
            const parseV6 = (data) => {
                const q = data.quoteResponse.result[0];
                return { price: q.regularMarketPrice, prevClose: q.regularMarketPreviousClose };
            };
            const proxies = [
                u => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
                u => `https://corsproxy.io/?${encodeURIComponent(u)}`,
                u => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(u)}`,
                u => `https://corsproxy.org/?${encodeURIComponent(u)}`,
                u => `https://thingproxy.freeboard.io/fetch/${u}`,
            ];
            const apis = [
                ...proxies.map(p => ({ url: p(yahooV8), parse: parseV8 })),
                ...proxies.map(p => ({ url: p(yahooV6), parse: parseV6 })),
            ];

            for (const api of apis) {
                try {
                    const resp = await fetch(api.url, { signal: AbortSignal.timeout(8000) });
                    if (!resp.ok) continue;
                    const data = await resp.json();
                    const result = api.parse(data);
                    if (result.price) {
                        document.getElementById('manualPrice').value = result.price;
                        currentRtPrice = result.price;
                        const chg = result.prevClose ? result.price - result.prevClose : 0;
                        const chgPct = result.prevClose ? (chg / result.prevClose * 100) : 0;
                        const sign = chg >= 0 ? '+' : '';
                        statusEl.style.color = '#4caf50';
                        statusEl.textContent = `${symbol} = ${result.price} (${sign}${chgPct.toFixed(2)}%) · ${new Date().toLocaleTimeString('zh-CN')}`;
                        calculate();
                        return;
                    }
                } catch (e) { continue; }
            }

            statusEl.style.color = '#f44336';
            statusEl.textContent = `${symbol} 获取失败（API受限），请手动输入当前价格`;
        }

        // --- Records Management ---
        function showAddForm() {
            document.getElementById('addForm').classList.add('active');
            document.getElementById('addPrice').focus();
        }

        function hideAddForm() {
            document.getElementById('addForm').classList.remove('active');
            document.getElementById('addPrice').value = '';
            document.getElementById('addShares').value = '';
            editingId = null;
        }

        function useCurrentPrice() {
            if (!currentRtPrice) {
                alert('请先在上方输入当前股价');
                return;
            }
            showAddForm();
            document.getElementById('addPrice').value = currentRtPrice;
            document.getElementById('addType').value = 'plan';
            document.getElementById('addShares').focus();
        }

        let editingId = null;

        function addRecord() {
            const price = parseFloat(document.getElementById('addPrice').value);
            const shares = parseInt(document.getElementById('addShares').value);
            const type = document.getElementById('addType').value;

            if (!price || price <= 0) { alert('请输入有效价格'); return; }
            if (!shares || shares <= 0) { alert('请输入有效股数'); return; }

            if (editingId !== null) {
                const rec = records.find(r => r.id === editingId);
                if (rec) { rec.price = price; rec.shares = shares; rec.type = type; }
                editingId = null;
            } else {
                records.push({ price, shares, type, id: Date.now() });
            }
            hideAddForm();
            renderRecords();
            calculate();
        }

        function editRecord(id) {
            const rec = records.find(r => r.id === id);
            if (!rec) return;
            editingId = id;
            document.getElementById('addPrice').value = rec.price;
            document.getElementById('addShares').value = rec.shares;
            document.getElementById('addType').value = rec.type;
            document.getElementById('addForm').classList.add('active');
            document.getElementById('addPrice').focus();
        }

        function removeRecord(id) {
            records = records.filter(r => r.id !== id);
            renderRecords();
            calculate();
        }

        function renderRecords() {
            const list = document.getElementById('recordsList');
            const empty = document.getElementById('emptyState');

            if (records.length === 0) {
                empty.style.display = 'block';
                list.querySelectorAll('.record-item').forEach(el => el.remove());
                return;
            }

            empty.style.display = 'none';
            // Remove old items
            list.querySelectorAll('.record-item').forEach(el => el.remove());

            const costPrice = parseFloat(document.getElementById('costPrice').value) || 0;

            records.forEach((rec, i) => {
                const profit = costPrice > 0 ? (rec.price - costPrice) * rec.shares : 0;
                const vsCost = costPrice > 0 ? ((rec.price - costPrice) / costPrice * 100) : null;
                const vsNow = currentRtPrice ? ((rec.price - currentRtPrice) / currentRtPrice * 100) : null;
                const div = document.createElement('div');
                div.className = 'record-item';
                div.innerHTML = `
                    <div class="record-top">
                        <div class="record-top-left">
                            <span class="record-tag ${rec.type === 'done' ? 'tag-done' : 'tag-plan'}">${rec.type === 'done' ? '已卖出' : '计划卖出'}</span>
                            <span class="rec-price">${rec.price.toFixed(3)}</span>
                            <span class="rec-pct">
                                ${vsCost !== null ? `<span class="${vsCost >= 0 ? 'pos' : 'neg'}">成本${vsCost >= 0 ? '+' : ''}${vsCost.toFixed(1)}%</span>` : ''}
                                ${vsNow !== null ? `<span class="${vsNow >= 0 ? 'pos' : 'neg'}">现价${vsNow >= 0 ? '+' : ''}${vsNow.toFixed(1)}%</span>` : ''}
                            </span>
                        </div>
                        <span class="rec-actions">
                            <button class="rec-btn rec-edit" onclick="editRecord(${rec.id})" title="修改">&#9998;</button>
                            <button class="rec-btn rec-del" onclick="removeRecord(${rec.id})" title="删除">&times;</button>
                        </span>
                    </div>
                    <div class="record-bottom">
                        <span class="rec-details">
                            <span class="rec-shares">${rec.shares.toLocaleString()} 股</span>
                            <span class="rec-profit ${profit >= 0 ? 'pos' : 'neg'}">${costPrice > 0 ? (profit >= 0 ? '+' : '') + formatMoney(profit) : '--'}</span>
                        </span>
                    </div>
                `;
                list.appendChild(div);
            });
        }

        // --- Calculate ---
        function calculate() {
            const costPrice = parseFloat(document.getElementById('costPrice').value) || 0;
            const totalShares = parseInt(document.getElementById('totalShares').value) || 0;
            const area = document.getElementById('resultsArea');

            if (costPrice <= 0 || totalShares <= 0) {
                area.innerHTML = '<div class="input-group"><div class="empty-state">请先输入持仓信息和减仓记录</div></div>';
                document.getElementById('saveImgBtn').classList.remove('visible');
                return;
            }

            // Re-render records to update profit
            renderRecordsQuiet();

            const totalCost = costPrice * totalShares;

            let soldShares = 0, soldRevenue = 0;
            let planShares = 0, planRevenue = 0;

            records.forEach(r => {
                if (r.type === 'done') {
                    soldShares += r.shares;
                    soldRevenue += r.price * r.shares;
                } else {
                    planShares += r.shares;
                    planRevenue += r.price * r.shares;
                }
            });

            const remainShares = totalShares - soldShares - planShares;
            const totalRevenue = soldRevenue + planRevenue;
            const totalProfit = totalRevenue - (soldShares + planShares) * costPrice;

            // Remaining value (use realtime price if available)
            let remainValue = 0;
            let remainProfit = 0;
            if (remainShares > 0 && currentRtPrice) {
                remainValue = remainShares * currentRtPrice;
                remainProfit = (currentRtPrice - costPrice) * remainShares;
            }

            const grandProfit = totalProfit + remainProfit;
            const grandRevenue = totalRevenue + remainValue;
            const profitRate = ((grandProfit) / totalCost * 100);

            const isProfit = grandProfit >= 0;

            // Calculate average sell price
            const allSellShares = soldShares + planShares;
            const avgSellPrice = allSellShares > 0 ? (soldRevenue + planRevenue) / allSellShares : 0;

            const cur = getCurrency();

            area.innerHTML = `
                <div class="results ${isProfit ? '' : 'loss'}">
                    <div class="result-big">
                        <div class="rb-label">预计总盈亏</div>
                        <div class="rb-value ${isProfit ? 'pos' : 'neg'}">
                            ${isProfit ? '+' : ''}${formatMoney(grandProfit)} <span>${cur}</span>
                        </div>
                        <div class="rb-rate ${isProfit ? 'pos' : 'neg'}">
                            收益率 ${isProfit ? '+' : ''}${profitRate.toFixed(2)}%
                        </div>
                        <div style="font-size:14px;color:#64748B;margin-top:4px;">${fmtCNY(grandProfit)}</div>
                    </div>

                    <div class="result-row">
                        <span>总成本</span>
                        <span class="rv">${formatMoney(totalCost)} ${cur} <small style="color:#475569">${fmtCNY(totalCost)}</small></span>
                    </div>
                    <div class="result-row">
                        <span>已卖出回款</span>
                        <span class="rv">${formatMoney(soldRevenue)} (${soldShares.toLocaleString()}股) <small style="color:#475569">${fmtCNY(soldRevenue)}</small></span>
                    </div>
                    <div class="result-row">
                        <span>计划卖出回款</span>
                        <span class="rv">${formatMoney(planRevenue)} (${planShares.toLocaleString()}股) <small style="color:#475569">${fmtCNY(planRevenue)}</small></span>
                    </div>
                    ${remainShares > 0 ? `
                    <div class="result-row">
                        <span>剩余持仓${currentRtPrice ? '(按实时价)' : ''}</span>
                        <span class="rv">${remainShares.toLocaleString()}股${currentRtPrice ? ' ≈ ' + formatMoney(remainValue) + ' <small style="color:#475569">' + fmtCNY(remainValue) + '</small>' : ''}</span>
                    </div>` : ''}
                    ${allSellShares > 0 ? `
                    <div class="result-row">
                        <span>卖出均价</span>
                        <span class="rv">${avgSellPrice.toFixed(3)} ${cur}</span>
                    </div>` : ''}
                    <div class="result-row">
                        <span>预计总回款</span>
                        <span class="rv" style="color:#fff;font-size:15px;">${formatMoney(grandRevenue)} ${cur} <small style="color:#475569">${fmtCNY(grandRevenue)}</small></span>
                    </div>

                    <!-- Position Bar -->
                    <div class="pos-bar-container">
                        <div class="pos-bar-label">
                            <span>仓位分布</span>
                            <span>总 ${totalShares.toLocaleString()} 股</span>
                        </div>
                        <div class="pos-bar">
                            <div class="bar-sold" style="width:${totalShares > 0 ? soldShares / totalShares * 100 : 0}%"></div>
                            <div class="bar-plan" style="width:${totalShares > 0 ? planShares / totalShares * 100 : 0}%"></div>
                            <div class="bar-hold" style="width:${totalShares > 0 ? Math.max(0, remainShares) / totalShares * 100 : 0}%"></div>
                        </div>
                        <div class="pos-legend">
                            <span><i class="leg-sold"></i>已卖 ${soldShares.toLocaleString()}</span>
                            <span><i class="leg-plan"></i>计划 ${planShares.toLocaleString()}</span>
                            <span><i class="leg-hold"></i>持有 ${Math.max(0, remainShares).toLocaleString()}</span>
                        </div>
                    </div>

                    <!-- Batch Breakdown with floating profit -->
                    ${records.length > 0 ? `
                    <div class="batches-visual">
                        ${(() => {
                            let accRev = 0, accSh = 0;
                            return records.map((r, i) => {
                                const batchProfit = (r.price - costPrice) * r.shares;
                                accRev += r.price * r.shares;
                                accSh += r.shares;
                                const remSh = totalShares - accSh;
                                const floatingProfit = (accRev + remSh * r.price) - totalCost;
                                return `
                                <div class="bv-item ${r.type === 'done' ? 'bv-done' : 'bv-plan'}">
                                    <div class="bv-num">${r.type === 'done' ? '✓' : (i + 1)}</div>
                                    <div class="bv-info">
                                        <strong>${r.price.toFixed(3)}</strong> × ${r.shares.toLocaleString()}股
                                        = ${formatMoney(r.price * r.shares)}
                                        <div style="font-size:11px;color:#64748B;margin-top:2px;">
                                            本批盈亏 <span class="${batchProfit >= 0 ? 'pos' : 'neg'}" style="color:${batchProfit >= 0 ? '#4caf50' : '#f44336'}">${batchProfit >= 0 ? '+' : ''}${formatMoney(batchProfit)}</span>
                                        </div>
                                    </div>
                                    <div style="text-align:right;">
                                        <div class="bv-profit ${floatingProfit >= 0 ? 'pos' : 'neg'}">
                                            ${floatingProfit >= 0 ? '+' : ''}${formatMoney(floatingProfit)}
                                        </div>
                                        <div style="font-size:10px;color:#475569;">浮盈</div>
                                    </div>
                                </div>`;
                            }).join('');
                        })()}
                        ${remainShares > 0 && currentRtPrice ? `
                        <div class="bv-item bv-plan">
                            <div class="bv-num" style="background:rgba(79,195,247,0.2);color:#4fc3f7;">⟡</div>
                            <div class="bv-info">
                                剩余 <strong>${remainShares.toLocaleString()}股</strong> 按实时价 ${currentRtPrice.toFixed(3)}
                            </div>
                            <div class="bv-profit ${remainProfit >= 0 ? 'pos' : 'neg'}">
                                ${remainProfit >= 0 ? '+' : ''}${formatMoney(remainProfit)}
                            </div>
                        </div>` : ''}
                    </div>` : ''}

                    <!-- Charts -->
                    ${records.length > 0 ? `
                    <div class="charts-section">
                        <div class="charts-title">可视化分析</div>
                        <div class="charts-grid">
                            <div class="chart-card">
                                <div class="chart-card-title">各批次价格 vs 买入均价</div>
                                <canvas id="priceChart" height="180"></canvas>
                            </div>
                            <div class="chart-card">
                                <div class="chart-card-title">卖出节点浮盈走势</div>
                                <canvas id="profitChart" height="180"></canvas>
                            </div>
                        </div>
                    </div>` : ''}
                </div>
            `;
            document.getElementById('saveImgBtn').classList.add('visible');
            if (records.length > 0) {
                setTimeout(() => drawCharts(costPrice, totalShares, records, remainShares, currentRtPrice), 0);
            }
        }

        // --- Charts ---
        function drawCharts(costPrice, totalShares, recs, remainShares, rtPrice) {
            drawPriceChart(costPrice, recs, remainShares, rtPrice);
            drawProfitChart(costPrice, totalShares, recs, remainShares, rtPrice);
        }

        function drawPriceChart(costPrice, recs, remainShares, rtPrice) {
            const canvas = document.getElementById('priceChart');
            if (!canvas) return;
            const dpr = window.devicePixelRatio || 1;
            const rect = canvas.getBoundingClientRect();
            canvas.width = rect.width * dpr;
            canvas.height = rect.height * dpr;
            const ctx = canvas.getContext('2d');
            ctx.scale(dpr, dpr);
            const W = rect.width, H = rect.height;

            // Data: each record + optional remaining
            const items = recs.map((r, i) => ({
                label: `${r.type === 'done' ? '已卖' : '计划'}${i + 1}`,
                price: r.price,
                color: r.type === 'done' ? '#4caf50' : '#FBBF24'
            }));
            if (remainShares > 0 && rtPrice) {
                items.push({ label: '持有', price: rtPrice, color: '#4fc3f7' });
            }
            if (items.length === 0) return;

            const allPrices = items.map(d => d.price).concat([costPrice]);
            const maxP = Math.max(...allPrices) * 1.15;
            const minP = Math.min(...allPrices) * 0.85;
            const range = maxP - minP || 1;

            const pad = { top: 20, bottom: 28, left: 10, right: 10 };
            const chartW = W - pad.left - pad.right;
            const chartH = H - pad.top - pad.bottom;
            const barW = Math.min(36, (chartW / items.length) * 0.6);
            const gap = chartW / items.length;

            // Cost line
            const costY = pad.top + chartH * (1 - (costPrice - minP) / range);
            ctx.strokeStyle = 'rgba(244,67,54,0.5)';
            ctx.lineWidth = 1;
            ctx.setLineDash([4, 4]);
            ctx.beginPath();
            ctx.moveTo(pad.left, costY);
            ctx.lineTo(W - pad.right, costY);
            ctx.stroke();
            ctx.setLineDash([]);

            // Cost label
            ctx.fillStyle = '#f44336';
            ctx.font = '10px IBM Plex Sans, sans-serif';
            ctx.textAlign = 'right';
            ctx.fillText('成本 ' + costPrice.toFixed(2), W - pad.right, costY - 4);

            // Bars
            items.forEach((d, i) => {
                const x = pad.left + i * gap + (gap - barW) / 2;
                const barH = chartH * (d.price - minP) / range;
                const y = pad.top + chartH - barH;

                ctx.fillStyle = d.color;
                ctx.beginPath();
                const r = 3;
                ctx.moveTo(x + r, y);
                ctx.lineTo(x + barW - r, y);
                ctx.quadraticCurveTo(x + barW, y, x + barW, y + r);
                ctx.lineTo(x + barW, pad.top + chartH);
                ctx.lineTo(x, pad.top + chartH);
                ctx.lineTo(x, y + r);
                ctx.quadraticCurveTo(x, y, x + r, y);
                ctx.fill();

                // Price on top
                ctx.fillStyle = '#F8FAFC';
                ctx.font = 'bold 11px IBM Plex Sans, sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(d.price.toFixed(2), x + barW / 2, y - 4);

                // Label below
                ctx.fillStyle = '#64748B';
                ctx.font = '10px IBM Plex Sans, sans-serif';
                ctx.fillText(d.label, x + barW / 2, H - 6);
            });
        }

        function drawProfitChart(costPrice, totalShares, recs, remainShares, rtPrice) {
            const canvas = document.getElementById('profitChart');
            if (!canvas) return;
            const dpr = window.devicePixelRatio || 1;
            const rect = canvas.getBoundingClientRect();
            canvas.width = rect.width * dpr;
            canvas.height = rect.height * dpr;
            const ctx = canvas.getContext('2d');
            ctx.scale(dpr, dpr);
            const W = rect.width, H = rect.height;

            // Calculate floating profit at each sell node
            const totalCost = costPrice * totalShares;
            let accRevenue = 0;
            let accShares = 0;
            const nodes = recs.map((r, i) => {
                accRevenue += r.price * r.shares;
                accShares += r.shares;
                const remShares = totalShares - accShares;
                const remValue = remShares * r.price; // remaining valued at this sell price
                const floatingProfit = (accRevenue + remValue) - totalCost;
                return {
                    label: `${r.type === 'done' ? '已卖' : '计划'}${i + 1}`,
                    profit: floatingProfit,
                    price: r.price
                };
            });
            if (nodes.length === 0) return;

            const pad = { top: 24, bottom: 28, left: 50, right: 14 };
            const chartW = W - pad.left - pad.right;
            const chartH = H - pad.top - pad.bottom;

            const profits = nodes.map(n => n.profit);
            const maxP = Math.max(...profits, 0) * 1.2 || 1;
            const minP = Math.min(...profits, 0) * 1.2 || -1;
            const range = maxP - minP || 1;

            const toY = v => pad.top + chartH * (1 - (v - minP) / range);
            const toX = i => pad.left + (nodes.length === 1 ? chartW / 2 : i / (nodes.length - 1) * chartW);

            // Zero line
            const zeroY = toY(0);
            ctx.strokeStyle = 'rgba(255,255,255,0.1)';
            ctx.lineWidth = 1;
            ctx.setLineDash([3, 3]);
            ctx.beginPath();
            ctx.moveTo(pad.left, zeroY);
            ctx.lineTo(W - pad.right, zeroY);
            ctx.stroke();
            ctx.setLineDash([]);

            ctx.fillStyle = '#475569';
            ctx.font = '10px IBM Plex Sans, sans-serif';
            ctx.textAlign = 'right';
            ctx.textBaseline = 'middle';
            ctx.fillText('0', pad.left - 6, zeroY);

            // Fill area
            ctx.beginPath();
            nodes.forEach((n, i) => {
                const x = toX(i), y = toY(n.profit);
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            });
            // Close to zero line
            ctx.lineTo(toX(nodes.length - 1), zeroY);
            ctx.lineTo(toX(0), zeroY);
            ctx.closePath();

            // Gradient fill
            const lastProfit = nodes[nodes.length - 1].profit;
            const grad = ctx.createLinearGradient(0, pad.top, 0, pad.top + chartH);
            if (maxP > 0) {
                grad.addColorStop(0, 'rgba(76,175,80,0.25)');
                grad.addColorStop((maxP) / range, 'rgba(76,175,80,0.05)');
            }
            if (minP < 0) {
                grad.addColorStop((maxP) / range, 'rgba(244,67,54,0.05)');
                grad.addColorStop(1, 'rgba(244,67,54,0.2)');
            }
            ctx.fillStyle = grad;
            ctx.fill();

            // Line
            ctx.beginPath();
            nodes.forEach((n, i) => {
                const x = toX(i), y = toY(n.profit);
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            });
            ctx.strokeStyle = lastProfit >= 0 ? '#4caf50' : '#f44336';
            ctx.lineWidth = 2;
            ctx.lineJoin = 'round';
            ctx.stroke();

            // Data points + values
            nodes.forEach((n, i) => {
                const x = toX(i), y = toY(n.profit);
                const color = n.profit >= 0 ? '#4caf50' : '#f44336';

                // Dot
                ctx.beginPath();
                ctx.arc(x, y, 4, 0, Math.PI * 2);
                ctx.fillStyle = color;
                ctx.fill();
                ctx.strokeStyle = '#0a0a0a';
                ctx.lineWidth = 2;
                ctx.stroke();

                // Value label
                ctx.fillStyle = color;
                ctx.font = 'bold 11px IBM Plex Sans, sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = n.profit >= 0 ? 'bottom' : 'top';
                ctx.fillText((n.profit >= 0 ? '+' : '') + formatMoney(n.profit), x, y + (n.profit >= 0 ? -8 : 8));

                // X label
                ctx.fillStyle = '#64748B';
                ctx.font = '10px IBM Plex Sans, sans-serif';
                ctx.textBaseline = 'top';
                ctx.fillText(n.label, x, H - 18);
            });

            // Y-axis labels (max/min)
            ctx.fillStyle = '#475569';
            ctx.font = '10px IBM Plex Sans, sans-serif';
            ctx.textAlign = 'right';
            ctx.textBaseline = 'top';
            if (maxP > 0) ctx.fillText('+' + formatMoney(maxP / 1.2), pad.left - 6, pad.top);
            ctx.textBaseline = 'bottom';
            if (minP < 0) ctx.fillText(formatMoney(minP / 1.2), pad.left - 6, H - pad.bottom);
        }

        function renderRecordsQuiet() {
            const list = document.getElementById('recordsList');
            const empty = document.getElementById('emptyState');
            const costPrice = parseFloat(document.getElementById('costPrice').value) || 0;

            if (records.length === 0) {
                empty.style.display = 'block';
                list.querySelectorAll('.record-item').forEach(el => el.remove());
                return;
            }
            empty.style.display = 'none';
            list.querySelectorAll('.record-item').forEach(el => el.remove());

            records.forEach((rec) => {
                const profit = costPrice > 0 ? (rec.price - costPrice) * rec.shares : 0;
                const vsCost = costPrice > 0 ? ((rec.price - costPrice) / costPrice * 100) : null;
                const vsNow = currentRtPrice ? ((rec.price - currentRtPrice) / currentRtPrice * 100) : null;
                const div = document.createElement('div');
                div.className = 'record-item';
                div.innerHTML = `
                    <div class="record-top">
                        <div class="record-top-left">
                            <span class="record-tag ${rec.type === 'done' ? 'tag-done' : 'tag-plan'}">${rec.type === 'done' ? '已卖出' : '计划卖出'}</span>
                            <span class="rec-price">${rec.price.toFixed(3)}</span>
                            <span class="rec-pct">
                                ${vsCost !== null ? `<span class="${vsCost >= 0 ? 'pos' : 'neg'}">成本${vsCost >= 0 ? '+' : ''}${vsCost.toFixed(1)}%</span>` : ''}
                                ${vsNow !== null ? `<span class="${vsNow >= 0 ? 'pos' : 'neg'}">现价${vsNow >= 0 ? '+' : ''}${vsNow.toFixed(1)}%</span>` : ''}
                            </span>
                        </div>
                        <span class="rec-actions">
                            <button class="rec-btn rec-edit" onclick="editRecord(${rec.id})" title="修改">&#9998;</button>
                            <button class="rec-btn rec-del" onclick="removeRecord(${rec.id})" title="删除">&times;</button>
                        </span>
                    </div>
                    <div class="record-bottom">
                        <span class="rec-details">
                            <span class="rec-shares">${rec.shares.toLocaleString()} 股</span>
                            <span class="rec-profit ${profit >= 0 ? 'pos' : 'neg'}">${costPrice > 0 ? (profit >= 0 ? '+' : '') + formatMoney(profit) : '--'}</span>
                        </span>
                    </div>
                `;
                list.appendChild(div);
            });
        }

        // --- Save as image ---
        function saveAsImage() {
            const area = document.getElementById('resultsArea');
            const btn = document.getElementById('saveImgBtn');
            if (!area.querySelector('.results')) return;

            btn.textContent = '正在生成图片...';
            btn.disabled = true;

            html2canvas(area, {
                backgroundColor: '#0a0a0a',
                scale: 2,
                useCORS: true,
                logging: false
            }).then(canvas => {
                const link = document.createElement('a');
                const stock = document.getElementById('stockInput').value.trim() || '推演';
                const date = new Date().toISOString().slice(0, 10);
                link.download = `${stock}_止盈推演_${date}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
                btn.textContent = '保存推演结果为图片';
                btn.disabled = false;
            }).catch(() => {
                btn.textContent = '保存推演结果为图片';
                btn.disabled = false;
                alert('生成图片失败，请重试');
            });
        }

        function formatMoney(n) {
            if (Math.abs(n) >= 10000) {
                return (n / 10000).toFixed(2) + '万';
            }
            return n.toFixed(2);
        }

        // --- Plan Save/Load (localStorage, private to your browser) ---
        const PLAN_STORAGE_KEY = 'cry_plans';

        function getPlans() {
            try { return JSON.parse(localStorage.getItem(PLAN_STORAGE_KEY)) || {}; }
            catch { return {}; }
        }

        function refreshPlanSelect(selectName) {
            const sel = document.getElementById('planSelect');
            const plans = getPlans();
            const names = Object.keys(plans).sort();
            sel.innerHTML = '<option value="">-- 选择已保存方案 --</option>';
            names.forEach(name => {
                const opt = document.createElement('option');
                opt.value = name;
                opt.textContent = name;
                sel.appendChild(opt);
            });
            if (selectName && names.includes(selectName)) {
                sel.value = selectName;
            }
        }

        function savePlan() {
            const stock = document.getElementById('stockInput').value.trim();
            const costPrice = document.getElementById('costPrice').value;
            const totalShares = document.getElementById('totalShares').value;
            const manualPrice = document.getElementById('manualPrice').value;

            if (!stock && !costPrice && records.length === 0) {
                alert('当前没有数据可保存'); return;
            }

            const defaultName = stock || '未命名方案';
            const currentSel = document.getElementById('planSelect').value;
            const name = prompt('方案名称：', currentSel || defaultName);
            if (!name) return;

            const market = document.getElementById('marketSelect').value;
            const plans = getPlans();
            plans[name] = {
                stock, costPrice, totalShares, manualPrice, market,
                records: records.map(r => ({ price: r.price, shares: r.shares, type: r.type })),
                savedAt: new Date().toISOString()
            };
            localStorage.setItem(PLAN_STORAGE_KEY, JSON.stringify(plans));
            refreshPlanSelect(name);
            alert('方案已保存到本地浏览器');
        }

        function loadPlan() {
            const name = document.getElementById('planSelect').value;
            if (!name) return;
            const plans = getPlans();
            const plan = plans[name];
            if (!plan) return;

            document.getElementById('stockInput').value = plan.stock || '';
            document.getElementById('marketSelect').value = plan.market || 'HK';
            document.getElementById('costPrice').value = plan.costPrice || '';
            document.getElementById('totalShares').value = plan.totalShares || '';
            document.getElementById('manualPrice').value = plan.manualPrice || '';
            updateBadge();

            if (plan.manualPrice) {
                currentRtPrice = parseFloat(plan.manualPrice);
            } else {
                currentRtPrice = null;
            }

            records = (plan.records || []).map((r, i) => ({
                price: r.price, shares: r.shares, type: r.type, id: Date.now() + i
            }));
            renderRecords();
            calculate();
        }

        function deletePlan() {
            const name = document.getElementById('planSelect').value;
            if (!name) { alert('请先选择一个方案'); return; }
            if (!confirm(`确定删除方案「${name}」？`)) return;
            const plans = getPlans();
            delete plans[name];
            localStorage.setItem(PLAN_STORAGE_KEY, JSON.stringify(plans));
            refreshPlanSelect();
        }

        // Focus stock input on load, refresh plan list
        document.addEventListener('DOMContentLoaded', () => {
            refreshPlanSelect();
            fetchFxRates();
            document.getElementById('stockInput').focus();

        });
    </script>
</body>
