<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>止盈计算推演 - 通用港股/美股工具</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background: #12131a;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .card {
            width: 100%;
            max-width: 460px;
            background: linear-gradient(180deg, #1e2230 0%, #181c28 100%);
            border-radius: 20px;
            padding: 28px 22px 24px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.5);
        }

        /* Header */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(255,160,0,0.15);
            color: #ffa000;
            font-size: 13px;
            font-weight: 600;
            padding: 5px 16px;
            border-radius: 20px;
            margin: 0 auto 14px;
        }
        .badge::before {
            content: '';
            width: 8px; height: 8px;
            background: #ffa000;
            border-radius: 50%;
        }

        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { font-size: 24px; font-weight: 700; color: #fff; margin-bottom: 6px; letter-spacing: 2px; }
        .header .sub { font-size: 13px; color: #6b7394; }

        /* Real-time price */
        .realtime-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(79,195,247,0.06);
            border: 1px solid rgba(79,195,247,0.15);
            border-radius: 12px;
            padding: 12px 16px;
            margin-bottom: 20px;
            cursor: pointer;
            transition: border-color 0.3s;
        }
        .realtime-bar:hover { border-color: rgba(79,195,247,0.35); }
        .realtime-bar .rt-left { display: flex; align-items: center; gap: 10px; }
        .rt-dot {
            width: 8px; height: 8px;
            background: #4fc3f7;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        .rt-label { font-size: 12px; color: #6b7394; }
        .rt-price { font-size: 22px; font-weight: 700; color: #4fc3f7; }
        .rt-change { font-size: 13px; font-weight: 600; margin-left: 8px; }
        .rt-change.up { color: #4caf50; }
        .rt-change.down { color: #f44336; }
        .rt-time { font-size: 11px; color: #4a5070; }

        /* Section titles */
        .section-title {
            font-size: 14px;
            font-weight: 600;
            color: #8892b0;
            margin-bottom: 12px;
            padding-left: 10px;
            border-left: 3px solid #7b61ff;
        }

        /* Input Groups */
        .input-group {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 14px;
            padding: 16px;
            margin-bottom: 16px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 10px;
        }
        .form-row:last-child { margin-bottom: 0; }
        .form-row.three-col { grid-template-columns: 1fr 1fr 1fr; }

        .field { display: flex; flex-direction: column; gap: 4px; }
        .field label {
            font-size: 11px;
            color: #4a5070;
            font-weight: 500;
        }
        .field input {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            padding: 10px 12px;
            color: #fff;
            font-size: 15px;
            font-weight: 600;
            outline: none;
            transition: border-color 0.2s;
            width: 100%;
        }
        .field input:focus { border-color: #7b61ff; }
        .field input::placeholder { color: #3a3f55; font-weight: 400; }

        /* Reduction records */
        .records-list { margin-top: 8px; }

        .record-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 10px;
            padding: 10px 14px;
            margin-bottom: 8px;
            font-size: 13px;
        }
        .record-item .rec-info { flex: 1; }
        .record-item .rec-info span { color: #6b7394; }
        .record-item .rec-price { color: #4caf50; font-weight: 600; margin-right: 6px; }
        .record-item .rec-shares { color: #ffb74d; font-weight: 600; margin-right: 6px; }
        .record-item .rec-profit { font-weight: 700; margin-right: 12px; }
        .record-item .rec-profit.pos { color: #4caf50; }
        .record-item .rec-profit.neg { color: #f44336; }

        .record-item .rec-actions { display: flex; gap: 4px; }
        .record-item .rec-btn {
            background: rgba(244,67,54,0.15);
            border: none;
            width: 24px; height: 24px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }
        .record-item .rec-del { color: #f44336; background: rgba(244,67,54,0.15); }
        .record-item .rec-del:hover { background: rgba(244,67,54,0.3); }
        .record-item .rec-edit { color: #4fc3f7; background: rgba(79,195,247,0.15); }
        .record-item .rec-edit:hover { background: rgba(79,195,247,0.3); }

        .record-tag {
            display: inline-block;
            font-size: 10px;
            padding: 1px 8px;
            border-radius: 6px;
            margin-right: 8px;
            font-weight: 600;
        }
        .tag-done { background: rgba(76,175,80,0.15); color: #4caf50; }
        .tag-plan { background: rgba(255,183,77,0.15); color: #ffb74d; }

        /* Add buttons */
        .add-row {
            display: flex;
            gap: 8px;
            margin-top: 4px;
        }
        .btn {
            flex: 1;
            padding: 10px;
            border: 1px dashed rgba(255,255,255,0.15);
            background: transparent;
            color: #8892b0;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn:hover { background: rgba(255,255,255,0.05); color: #fff; }
        .btn-primary {
            border: none;
            background: linear-gradient(135deg, #7b61ff, #6c5ce7);
            color: #fff;
            font-weight: 600;
        }
        .btn-primary:hover { opacity: 0.9; }

        /* Add form (hidden by default) */
        .add-form {
            display: none;
            margin-top: 10px;
            padding: 14px;
            background: rgba(123,97,255,0.06);
            border: 1px solid rgba(123,97,255,0.2);
            border-radius: 12px;
        }
        .add-form.active { display: block; }
        .add-form .form-row { margin-bottom: 10px; }
        .add-form-actions { display: flex; gap: 8px; margin-top: 10px; }
        .add-form-actions .btn { padding: 8px; }

        /* Results */
        .results {
            background: linear-gradient(135deg, rgba(76,175,80,0.06), rgba(76,175,80,0.02));
            border: 1px solid rgba(76,175,80,0.15);
            border-radius: 14px;
            padding: 20px;
            margin-top: 20px;
        }
        .results.loss {
            background: linear-gradient(135deg, rgba(244,67,54,0.06), rgba(244,67,54,0.02));
            border-color: rgba(244,67,54,0.15);
        }

        .result-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
            font-size: 13px;
            color: #6b7394;
            border-bottom: 1px solid rgba(255,255,255,0.04);
        }
        .result-row:last-child { border-bottom: none; }
        .result-row .rv { color: #c0c8e0; font-weight: 600; }

        .result-big {
            text-align: center;
            padding: 16px 0 8px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            margin-bottom: 12px;
        }
        .result-big .rb-label { font-size: 12px; color: #6b7394; margin-bottom: 4px; }
        .result-big .rb-value { font-size: 38px; font-weight: 700; }
        .result-big .rb-value.pos { color: #4caf50; }
        .result-big .rb-value.neg { color: #f44336; }
        .result-big .rb-value span { font-size: 20px; }
        .result-big .rb-rate { font-size: 18px; font-weight: 600; margin-top: 4px; }
        .result-big .rb-rate.pos { color: #4caf50; }
        .result-big .rb-rate.neg { color: #f44336; }

        /* Position Bar */
        .pos-bar-container { margin: 16px 0 8px; }
        .pos-bar-label {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: #4a5070;
            margin-bottom: 6px;
        }
        .pos-bar {
            height: 8px;
            background: rgba(255,255,255,0.06);
            border-radius: 8px;
            overflow: hidden;
            display: flex;
        }
        .pos-bar .bar-sold {
            background: linear-gradient(90deg, #4caf50, #66bb6a);
            height: 100%;
            transition: width 0.5s;
        }
        .pos-bar .bar-plan {
            background: linear-gradient(90deg, #ffb74d, #ffa726);
            height: 100%;
            transition: width 0.5s;
        }
        .pos-bar .bar-hold {
            background: linear-gradient(90deg, #4fc3f7, #29b6f6);
            height: 100%;
            transition: width 0.5s;
        }
        .pos-legend {
            display: flex;
            gap: 14px;
            margin-top: 6px;
            font-size: 11px;
            color: #6b7394;
        }
        .pos-legend i {
            display: inline-block;
            width: 8px; height: 8px;
            border-radius: 2px;
            margin-right: 4px;
            vertical-align: middle;
        }
        .leg-sold { background: #4caf50; }
        .leg-plan { background: #ffb74d; }
        .leg-hold { background: #4fc3f7; }

        /* Batches visual */
        .batches-visual {
            margin-top: 16px;
        }
        .bv-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.04);
        }
        .bv-item:last-child { border-bottom: none; }
        .bv-num {
            width: 24px; height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 700;
            flex-shrink: 0;
        }
        .bv-done .bv-num { background: rgba(76,175,80,0.2); color: #4caf50; }
        .bv-plan .bv-num { background: rgba(255,183,77,0.2); color: #ffb74d; }
        .bv-info { flex: 1; font-size: 13px; color: #8892b0; }
        .bv-info strong { color: #c0c8e0; }
        .bv-profit { font-size: 14px; font-weight: 700; }
        .bv-profit.pos { color: #4caf50; }
        .bv-profit.neg { color: #f44336; }

        /* Disclaimer */
        .disclaimer {
            text-align: center;
            font-size: 11px;
            color: #3e4460;
            line-height: 1.7;
            padding-top: 16px;
            margin-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.04);
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 20px;
            color: #4a5070;
            font-size: 13px;
        }

        /* Plan management */
        .plan-bar {
            display: flex;
            gap: 6px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .plan-bar select {
            flex: 1;
            min-width: 0;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            padding: 8px 10px;
            color: #fff;
            font-size: 13px;
            outline: none;
        }
        .plan-bar select option { background: #1e2230; }
        .plan-btn {
            padding: 8px 12px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.04);
            color: #8892b0;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
        }
        .plan-btn:hover { background: rgba(255,255,255,0.08); color: #fff; }
        .plan-btn-save {
            background: linear-gradient(135deg, #7b61ff, #6c5ce7);
            border: none;
            color: #fff;
            font-weight: 600;
        }
        .plan-btn-save:hover { opacity: 0.9; }
        .plan-btn-del {
            border-color: rgba(244,67,54,0.3);
            color: #f44336;
        }
        .plan-btn-del:hover { background: rgba(244,67,54,0.15); }

        @media (max-width: 400px) {
            .form-row.three-col { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>
    <div class="card">
        <!-- Header -->
        <div class="header">
            <div class="badge" id="stockBadge">止盈推演工具</div>
            <h1>止盈计算推演</h1>
            <p class="sub">输入股票代码，持仓与减仓计划，计算最终盈利</p>
        </div>

        <!-- Plan Management -->
        <div class="section-title">方案管理</div>
        <div class="plan-bar">
            <select id="planSelect" onchange="loadPlan()">
                <option value="">-- 选择已保存方案 --</option>
            </select>
            <button class="plan-btn plan-btn-save" onclick="savePlan()">保存</button>
            <button class="plan-btn plan-btn-del" onclick="deletePlan()">删除</button>
        </div>

        <!-- Stock Info + Price -->
        <div class="section-title">股票 & 当前价格</div>
        <div class="input-group">
            <div class="form-row">
                <div class="field">
                    <label>股票名称/代码</label>
                    <input type="text" id="stockInput" placeholder="如: 02680 创陞控股" oninput="updateBadge()">
                </div>
                <div class="field">
                    <label>当前股价</label>
                    <div style="display:flex;gap:6px;">
                        <input type="number" step="0.001" id="manualPrice" placeholder="输入当前价" oninput="applyManualPrice()" style="flex:1;">
                        <button onclick="fetchPrice()" style="padding:8px 10px;background:linear-gradient(135deg,#4fc3f7,#29b6f6);border:none;border-radius:8px;color:#fff;font-weight:600;font-size:11px;cursor:pointer;white-space:nowrap;" title="尝试自动获取">刷新</button>
                    </div>
                </div>
            </div>
            <div id="rtStatus" style="font-size:11px;color:#4a5070;margin-top:4px;display:none;"></div>
        </div>

        <!-- 1. Position Input -->
        <div class="section-title">持仓信息</div>
        <div class="input-group">
            <div class="form-row">
                <div class="field">
                    <label>买入均价</label>
                    <input type="number" step="0.001" id="costPrice" placeholder="例: 11.50" oninput="calculate()">
                </div>
                <div class="field">
                    <label>总持仓股数</label>
                    <input type="number" step="1" id="totalShares" placeholder="例: 56000" oninput="calculate()">
                </div>
            </div>
        </div>

        <!-- 2. Reduction Records -->
        <div class="section-title">减仓记录 & 计划</div>
        <div class="input-group">
            <div class="records-list" id="recordsList">
                <div class="empty-state" id="emptyState">暂无减仓记录，点击下方按钮添加</div>
            </div>

            <!-- Add form -->
            <div class="add-form" id="addForm">
                <div class="form-row three-col">
                    <div class="field">
                        <label>卖出价格</label>
                        <input type="number" step="0.001" id="addPrice" placeholder="价格">
                    </div>
                    <div class="field">
                        <label>卖出股数</label>
                        <input type="number" step="1" id="addShares" placeholder="股数">
                    </div>
                    <div class="field">
                        <label>类型</label>
                        <select id="addType" style="background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:10px 8px;color:#fff;font-size:14px;outline:none;">
                            <option value="done" style="background:#1e2230;">已卖出</option>
                            <option value="plan" style="background:#1e2230;">计划卖出</option>
                        </select>
                    </div>
                </div>
                <div class="add-form-actions">
                    <button class="btn" onclick="hideAddForm()">取消</button>
                    <button class="btn btn-primary" onclick="addRecord()">确认添加</button>
                </div>
            </div>

            <div class="add-row">
                <button class="btn" onclick="showAddForm()">+ 添加减仓记录</button>
                <button class="btn" onclick="useCurrentPrice()">用实时价添加</button>
            </div>
        </div>

        <!-- 3. Results -->
        <div class="section-title">推演结果</div>
        <div id="resultsArea">
            <div class="input-group">
                <div class="empty-state">请先输入持仓信息和减仓记录</div>
            </div>
        </div>

        <!-- Disclaimer -->
        <div class="disclaimer">
            本工具仅为个人计算参考，不构成投资建议<br>
            市场有风险 · 严守纪律，不贪不惧
        </div>
    </div>

    <script>
        // --- State ---
        let records = [];
        let currentRtPrice = null;

        // --- Price ---
        let currentSymbol = '';

        function updateBadge() {
            const name = document.getElementById('stockInput').value.trim();
            document.getElementById('stockBadge').textContent = name || '止盈推演工具';
        }

        function applyManualPrice() {
            const val = parseFloat(document.getElementById('manualPrice').value);
            if (isNaN(val) || val <= 0) { currentRtPrice = null; calculate(); return; }
            currentRtPrice = val;
            calculate();
        }

        // Auto-fetch: bonus feature, tries CORS proxies to Yahoo Finance
        async function fetchPrice() {
            const input = document.getElementById('stockInput').value.trim();
            // Extract stock code: try to find something like "2680" or "AAPL" or "2680.HK"
            let symbol = '';
            const codeMatch = input.match(/\b(\d{1,5})\b/);
            const tickerMatch = input.match(/\b([A-Za-z]{1,5}(?:\.\w+)?)\b/);
            const fullMatch = input.match(/\b(\d{1,5}\.[A-Z]{1,3})\b/i);

            if (fullMatch) {
                symbol = fullMatch[1].toUpperCase();
            } else if (codeMatch) {
                symbol = codeMatch[1].replace(/^0+/, '') + '.HK';
            } else if (tickerMatch) {
                symbol = tickerMatch[1].toUpperCase();
            }

            if (!symbol) {
                document.getElementById('rtStatus').style.display = 'block';
                document.getElementById('rtStatus').textContent = '无法识别股票代码，请手动输入价格';
                return;
            }

            currentSymbol = symbol;
            const statusEl = document.getElementById('rtStatus');
            statusEl.style.display = 'block';
            statusEl.textContent = `正在获取 ${symbol} 报价...`;
            statusEl.style.color = '#ffb74d';

            const yahooUrl = `https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(symbol)}?interval=1d&range=2d`;
            const yahooParse = (data) => {
                const meta = data.chart.result[0].meta;
                return { price: meta.regularMarketPrice, prevClose: meta.chartPreviousClose || meta.previousClose };
            };
            const apis = [
                { url: `https://api.allorigins.win/raw?url=${encodeURIComponent(yahooUrl)}`, parse: yahooParse },
                { url: `https://corsproxy.io/?${encodeURIComponent(yahooUrl)}`, parse: yahooParse },
                { url: `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(yahooUrl)}`, parse: yahooParse },
                { url: `https://corsproxy.org/?${encodeURIComponent(yahooUrl)}`, parse: yahooParse },
            ];

            for (const api of apis) {
                try {
                    const resp = await fetch(api.url, { signal: AbortSignal.timeout(6000) });
                    if (!resp.ok) continue;
                    const data = await resp.json();
                    const result = api.parse(data);
                    if (result.price) {
                        document.getElementById('manualPrice').value = result.price;
                        currentRtPrice = result.price;
                        const chg = result.prevClose ? result.price - result.prevClose : 0;
                        const chgPct = result.prevClose ? (chg / result.prevClose * 100) : 0;
                        const sign = chg >= 0 ? '+' : '';
                        statusEl.style.color = '#4caf50';
                        statusEl.textContent = `${symbol} = ${result.price} (${sign}${chgPct.toFixed(2)}%) · ${new Date().toLocaleTimeString('zh-CN')}`;
                        calculate();
                        return;
                    }
                } catch (e) { continue; }
            }

            statusEl.style.color = '#f44336';
            statusEl.textContent = `${symbol} 获取失败（API受限），请手动输入当前价格`;
        }

        // --- Records Management ---
        function showAddForm() {
            document.getElementById('addForm').classList.add('active');
            document.getElementById('addPrice').focus();
        }

        function hideAddForm() {
            document.getElementById('addForm').classList.remove('active');
            document.getElementById('addPrice').value = '';
            document.getElementById('addShares').value = '';
            editingId = null;
        }

        function useCurrentPrice() {
            if (!currentRtPrice) {
                alert('请先在上方输入当前股价');
                return;
            }
            showAddForm();
            document.getElementById('addPrice').value = currentRtPrice;
            document.getElementById('addType').value = 'plan';
            document.getElementById('addShares').focus();
        }

        let editingId = null;

        function addRecord() {
            const price = parseFloat(document.getElementById('addPrice').value);
            const shares = parseInt(document.getElementById('addShares').value);
            const type = document.getElementById('addType').value;

            if (!price || price <= 0) { alert('请输入有效价格'); return; }
            if (!shares || shares <= 0) { alert('请输入有效股数'); return; }

            if (editingId !== null) {
                const rec = records.find(r => r.id === editingId);
                if (rec) { rec.price = price; rec.shares = shares; rec.type = type; }
                editingId = null;
            } else {
                records.push({ price, shares, type, id: Date.now() });
            }
            hideAddForm();
            renderRecords();
            calculate();
        }

        function editRecord(id) {
            const rec = records.find(r => r.id === id);
            if (!rec) return;
            editingId = id;
            document.getElementById('addPrice').value = rec.price;
            document.getElementById('addShares').value = rec.shares;
            document.getElementById('addType').value = rec.type;
            document.getElementById('addForm').classList.add('active');
            document.getElementById('addPrice').focus();
        }

        function removeRecord(id) {
            records = records.filter(r => r.id !== id);
            renderRecords();
            calculate();
        }

        function renderRecords() {
            const list = document.getElementById('recordsList');
            const empty = document.getElementById('emptyState');

            if (records.length === 0) {
                empty.style.display = 'block';
                list.querySelectorAll('.record-item').forEach(el => el.remove());
                return;
            }

            empty.style.display = 'none';
            // Remove old items
            list.querySelectorAll('.record-item').forEach(el => el.remove());

            const costPrice = parseFloat(document.getElementById('costPrice').value) || 0;

            records.forEach((rec, i) => {
                const profit = costPrice > 0 ? (rec.price - costPrice) * rec.shares : 0;
                const div = document.createElement('div');
                div.className = 'record-item';
                div.innerHTML = `
                    <span class="record-tag ${rec.type === 'done' ? 'tag-done' : 'tag-plan'}">${rec.type === 'done' ? '已卖' : '计划'}</span>
                    <span class="rec-price">${rec.price.toFixed(3)}</span>
                    <span class="rec-shares">${rec.shares.toLocaleString()}股</span>
                    <span class="rec-profit ${profit >= 0 ? 'pos' : 'neg'}">${costPrice > 0 ? (profit >= 0 ? '+' : '') + formatMoney(profit) : '--'}</span>
                    <span class="rec-actions">
                        <button class="rec-btn rec-edit" onclick="editRecord(${rec.id})" title="修改">✎</button>
                        <button class="rec-btn rec-del" onclick="removeRecord(${rec.id})" title="删除">×</button>
                    </span>
                `;
                list.appendChild(div);
            });
        }

        // --- Calculate ---
        function calculate() {
            const costPrice = parseFloat(document.getElementById('costPrice').value) || 0;
            const totalShares = parseInt(document.getElementById('totalShares').value) || 0;
            const area = document.getElementById('resultsArea');

            if (costPrice <= 0 || totalShares <= 0) {
                area.innerHTML = '<div class="input-group"><div class="empty-state">请先输入持仓信息和减仓记录</div></div>';
                return;
            }

            // Re-render records to update profit
            renderRecordsQuiet();

            const totalCost = costPrice * totalShares;

            let soldShares = 0, soldRevenue = 0;
            let planShares = 0, planRevenue = 0;

            records.forEach(r => {
                if (r.type === 'done') {
                    soldShares += r.shares;
                    soldRevenue += r.price * r.shares;
                } else {
                    planShares += r.shares;
                    planRevenue += r.price * r.shares;
                }
            });

            const remainShares = totalShares - soldShares - planShares;
            const totalRevenue = soldRevenue + planRevenue;
            const totalProfit = totalRevenue - (soldShares + planShares) * costPrice;

            // Remaining value (use realtime price if available)
            let remainValue = 0;
            let remainProfit = 0;
            if (remainShares > 0 && currentRtPrice) {
                remainValue = remainShares * currentRtPrice;
                remainProfit = (currentRtPrice - costPrice) * remainShares;
            }

            const grandProfit = totalProfit + remainProfit;
            const grandRevenue = totalRevenue + remainValue;
            const profitRate = ((grandProfit) / totalCost * 100);

            const isProfit = grandProfit >= 0;

            // Calculate average sell price
            const allSellShares = soldShares + planShares;
            const avgSellPrice = allSellShares > 0 ? (soldRevenue + planRevenue) / allSellShares : 0;

            area.innerHTML = `
                <div class="results ${isProfit ? '' : 'loss'}">
                    <div class="result-big">
                        <div class="rb-label">预计总盈亏</div>
                        <div class="rb-value ${isProfit ? 'pos' : 'neg'}">
                            ${isProfit ? '+' : ''}${formatMoney(grandProfit)} <span>${currentSymbol.includes('.HK') ? 'HKD' : 'USD'}</span>
                        </div>
                        <div class="rb-rate ${isProfit ? 'pos' : 'neg'}">
                            收益率 ${isProfit ? '+' : ''}${profitRate.toFixed(2)}%
                        </div>
                    </div>

                    <div class="result-row">
                        <span>总成本</span>
                        <span class="rv">${formatMoney(totalCost)} ${currentSymbol.includes('.HK') ? 'HKD' : 'USD'}</span>
                    </div>
                    <div class="result-row">
                        <span>已卖出回款</span>
                        <span class="rv">${formatMoney(soldRevenue)} (${soldShares.toLocaleString()}股)</span>
                    </div>
                    <div class="result-row">
                        <span>计划卖出回款</span>
                        <span class="rv">${formatMoney(planRevenue)} (${planShares.toLocaleString()}股)</span>
                    </div>
                    ${remainShares > 0 ? `
                    <div class="result-row">
                        <span>剩余持仓${currentRtPrice ? '(按实时价)' : ''}</span>
                        <span class="rv">${remainShares.toLocaleString()}股${currentRtPrice ? ' ≈ ' + formatMoney(remainValue) : ''}</span>
                    </div>` : ''}
                    ${allSellShares > 0 ? `
                    <div class="result-row">
                        <span>卖出均价</span>
                        <span class="rv">${avgSellPrice.toFixed(3)} ${currentSymbol.includes('.HK') ? 'HKD' : 'USD'}</span>
                    </div>` : ''}
                    <div class="result-row">
                        <span>预计总回款</span>
                        <span class="rv" style="color:#fff;font-size:15px;">${formatMoney(grandRevenue)} ${currentSymbol.includes('.HK') ? 'HKD' : 'USD'}</span>
                    </div>

                    <!-- Position Bar -->
                    <div class="pos-bar-container">
                        <div class="pos-bar-label">
                            <span>仓位分布</span>
                            <span>总 ${totalShares.toLocaleString()} 股</span>
                        </div>
                        <div class="pos-bar">
                            <div class="bar-sold" style="width:${totalShares > 0 ? soldShares / totalShares * 100 : 0}%"></div>
                            <div class="bar-plan" style="width:${totalShares > 0 ? planShares / totalShares * 100 : 0}%"></div>
                            <div class="bar-hold" style="width:${totalShares > 0 ? Math.max(0, remainShares) / totalShares * 100 : 0}%"></div>
                        </div>
                        <div class="pos-legend">
                            <span><i class="leg-sold"></i>已卖 ${soldShares.toLocaleString()}</span>
                            <span><i class="leg-plan"></i>计划 ${planShares.toLocaleString()}</span>
                            <span><i class="leg-hold"></i>持有 ${Math.max(0, remainShares).toLocaleString()}</span>
                        </div>
                    </div>

                    <!-- Batch Breakdown -->
                    ${records.length > 0 ? `
                    <div class="batches-visual">
                        ${records.map((r, i) => {
                            const p = (r.price - costPrice) * r.shares;
                            return `
                            <div class="bv-item ${r.type === 'done' ? 'bv-done' : 'bv-plan'}">
                                <div class="bv-num">${r.type === 'done' ? '✓' : (i + 1)}</div>
                                <div class="bv-info">
                                    <strong>${r.price.toFixed(3)}</strong> × ${r.shares.toLocaleString()}股
                                    = ${formatMoney(r.price * r.shares)}
                                </div>
                                <div class="bv-profit ${p >= 0 ? 'pos' : 'neg'}">
                                    ${p >= 0 ? '+' : ''}${formatMoney(p)}
                                </div>
                            </div>`;
                        }).join('')}
                        ${remainShares > 0 && currentRtPrice ? `
                        <div class="bv-item bv-plan">
                            <div class="bv-num" style="background:rgba(79,195,247,0.2);color:#4fc3f7;">⟡</div>
                            <div class="bv-info">
                                剩余 <strong>${remainShares.toLocaleString()}股</strong> 按实时价 ${currentRtPrice.toFixed(3)}
                            </div>
                            <div class="bv-profit ${remainProfit >= 0 ? 'pos' : 'neg'}">
                                ${remainProfit >= 0 ? '+' : ''}${formatMoney(remainProfit)}
                            </div>
                        </div>` : ''}
                    </div>` : ''}
                </div>
            `;
        }

        function renderRecordsQuiet() {
            const list = document.getElementById('recordsList');
            const empty = document.getElementById('emptyState');
            const costPrice = parseFloat(document.getElementById('costPrice').value) || 0;

            if (records.length === 0) {
                empty.style.display = 'block';
                list.querySelectorAll('.record-item').forEach(el => el.remove());
                return;
            }
            empty.style.display = 'none';
            list.querySelectorAll('.record-item').forEach(el => el.remove());

            records.forEach((rec) => {
                const profit = costPrice > 0 ? (rec.price - costPrice) * rec.shares : 0;
                const div = document.createElement('div');
                div.className = 'record-item';
                div.innerHTML = `
                    <span class="record-tag ${rec.type === 'done' ? 'tag-done' : 'tag-plan'}">${rec.type === 'done' ? '已卖' : '计划'}</span>
                    <span class="rec-price">${rec.price.toFixed(3)}</span>
                    <span class="rec-shares">${rec.shares.toLocaleString()}股</span>
                    <span class="rec-profit ${profit >= 0 ? 'pos' : 'neg'}">${costPrice > 0 ? (profit >= 0 ? '+' : '') + formatMoney(profit) : '--'}</span>
                    <span class="rec-actions">
                        <button class="rec-btn rec-edit" onclick="editRecord(${rec.id})" title="修改">✎</button>
                        <button class="rec-btn rec-del" onclick="removeRecord(${rec.id})" title="删除">×</button>
                    </span>
                `;
                list.appendChild(div);
            });
        }

        function formatMoney(n) {
            if (Math.abs(n) >= 10000) {
                return (n / 10000).toFixed(2) + '万';
            }
            return n.toFixed(2);
        }

        // --- Plan Save/Load (localStorage, private to your browser) ---
        const PLAN_STORAGE_KEY = 'cry_plans';

        function getPlans() {
            try { return JSON.parse(localStorage.getItem(PLAN_STORAGE_KEY)) || {}; }
            catch { return {}; }
        }

        function refreshPlanSelect(selectName) {
            const sel = document.getElementById('planSelect');
            const plans = getPlans();
            const names = Object.keys(plans).sort();
            sel.innerHTML = '<option value="">-- 选择已保存方案 --</option>';
            names.forEach(name => {
                const opt = document.createElement('option');
                opt.value = name;
                opt.textContent = name;
                sel.appendChild(opt);
            });
            if (selectName && names.includes(selectName)) {
                sel.value = selectName;
            }
        }

        function savePlan() {
            const stock = document.getElementById('stockInput').value.trim();
            const costPrice = document.getElementById('costPrice').value;
            const totalShares = document.getElementById('totalShares').value;
            const manualPrice = document.getElementById('manualPrice').value;

            if (!stock && !costPrice && records.length === 0) {
                alert('当前没有数据可保存'); return;
            }

            const defaultName = stock || '未命名方案';
            const currentSel = document.getElementById('planSelect').value;
            const name = prompt('方案名称：', currentSel || defaultName);
            if (!name) return;

            const plans = getPlans();
            plans[name] = {
                stock, costPrice, totalShares, manualPrice,
                records: records.map(r => ({ price: r.price, shares: r.shares, type: r.type })),
                savedAt: new Date().toISOString()
            };
            localStorage.setItem(PLAN_STORAGE_KEY, JSON.stringify(plans));
            refreshPlanSelect(name);
            alert('方案已保存到本地浏览器');
        }

        function loadPlan() {
            const name = document.getElementById('planSelect').value;
            if (!name) return;
            const plans = getPlans();
            const plan = plans[name];
            if (!plan) return;

            document.getElementById('stockInput').value = plan.stock || '';
            document.getElementById('costPrice').value = plan.costPrice || '';
            document.getElementById('totalShares').value = plan.totalShares || '';
            document.getElementById('manualPrice').value = plan.manualPrice || '';
            updateBadge();

            if (plan.manualPrice) {
                currentRtPrice = parseFloat(plan.manualPrice);
            } else {
                currentRtPrice = null;
            }

            records = (plan.records || []).map((r, i) => ({
                price: r.price, shares: r.shares, type: r.type, id: Date.now() + i
            }));
            renderRecords();
            calculate();
        }

        function deletePlan() {
            const name = document.getElementById('planSelect').value;
            if (!name) { alert('请先选择一个方案'); return; }
            if (!confirm(`确定删除方案「${name}」？`)) return;
            const plans = getPlans();
            delete plans[name];
            localStorage.setItem(PLAN_STORAGE_KEY, JSON.stringify(plans));
            refreshPlanSelect();
        }

        // Focus stock input on load, refresh plan list
        document.addEventListener('DOMContentLoaded', () => {
            refreshPlanSelect();
            document.getElementById('stockInput').focus();
        });
    </script>
</body>
</html>
